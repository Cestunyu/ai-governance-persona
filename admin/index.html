<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Persona Results</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111214;
      --muted: #5f6672;
      --line: #dfe3e8;
      --soft: #f5f7f9;
      --accent: #176b5c;
      --danger: #a13b32;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .summary {
      margin-top: 4px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    input {
      width: min(360px, 72vw);
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    button {
      height: 36px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      padding: 0 12px;
      background: var(--ink);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      min-height: 22px;
      margin: 14px 0;
      color: var(--muted);
    }

    .status[data-tone="error"] {
      color: var(--danger);
    }

    .status[data-tone="ok"] {
      color: var(--accent);
    }

    .health {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0 10px;
    }

    .metric {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--soft);
    }

    .metric[data-state="ok"] {
      border-color: rgba(23, 107, 92, 0.45);
      background: rgba(23, 107, 92, 0.08);
    }

    .metric[data-state="warn"] {
      border-color: rgba(161, 59, 50, 0.35);
      background: rgba(161, 59, 50, 0.06);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric-value {
      margin-top: 5px;
      font-size: 15px;
      font-weight: 650;
    }

    .metric-detail {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--soft);
      color: #303640;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    td.summary-cell {
      max-width: 280px;
      white-space: normal;
      color: var(--muted);
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    @media (max-width: 720px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .health {
        grid-template-columns: 1fr;
      }

      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>AI Persona Results</h1>
        <div class="summary" id="summary">No records loaded</div>
      </div>
      <div class="controls">
        <input id="token" type="password" autocomplete="off" placeholder="Export token">
        <button id="refresh" type="button">Refresh</button>
        <button id="download" class="secondary" type="button">CSV</button>
      </div>
    </header>

    <section class="health" aria-label="System status">
      <div class="metric" id="dynamicMetric">
        <div class="metric-label">Dynamic API</div>
        <div class="metric-value">Checking</div>
        <div class="metric-detail">/api/health</div>
      </div>
      <div class="metric" id="storageMetric">
        <div class="metric-label">Storage</div>
        <div class="metric-value">Checking</div>
        <div class="metric-detail">Supabase</div>
      </div>
      <div class="metric" id="exportMetric">
        <div class="metric-label">Viewer Token</div>
        <div class="metric-value">Checking</div>
        <div class="metric-detail">EXPORT_TOKEN</div>
      </div>
    </section>

    <div class="status" id="status"></div>
    <div id="content" class="empty">Enter the export token to view stored submissions.</div>
  </main>

  <script>
    const tokenInput = document.querySelector("#token");
    const refreshButton = document.querySelector("#refresh");
    const downloadButton = document.querySelector("#download");
    const statusEl = document.querySelector("#status");
    const summaryEl = document.querySelector("#summary");
    const contentEl = document.querySelector("#content");
    const dynamicMetric = document.querySelector("#dynamicMetric");
    const storageMetric = document.querySelector("#storageMetric");
    const exportMetric = document.querySelector("#exportMetric");
    const columns = [
      ["created_at", "Created"],
      ["locale", "Locale"],
      ["profile_code", "Profile"],
      ["profile_name", "Name"],
      ["x", "X"],
      ["y", "Y"],
      ["c", "C"],
      ["h", "H"],
      ["duration_ms", "Duration"],
      ["summary", "Summary"]
    ];

    tokenInput.value = sessionStorage.getItem("aiPersonaResultsToken") || "";

    function setMetric(element, state, value, detail) {
      element.dataset.state = state;
      element.querySelector(".metric-value").textContent = value;
      element.querySelector(".metric-detail").textContent = detail;
    }

    function setStatus(message, tone = "") {
      statusEl.textContent = message;
      statusEl.dataset.tone = tone;
    }

    function token() {
      return tokenInput.value.trim();
    }

    async function fetchWithToken(path) {
      const value = token();
      if (!value) throw new Error("Missing export token.");
      sessionStorage.setItem("aiPersonaResultsToken", value);
      return fetch(path, {
        headers: {
          authorization: `Bearer ${value}`
        }
      });
    }

    async function checkHealth() {
      try {
        const response = await fetch("/api/health", { cache: "no-store" });
        const body = await response.json().catch(() => ({}));
        if (!response.ok || !body.ok) throw new Error(body.error || `Health check failed: ${response.status}`);

        setMetric(
          dynamicMetric,
          body.dynamic ? "ok" : "warn",
          body.dynamic ? "Online" : "Unavailable",
          body.runtime || "unknown runtime"
        );

        const missing = body.storage?.missing_env || [];
        const storageDetail = body.storage?.error || (missing.length ? missing.join(", ") : "Supabase ready");
        setMetric(
          storageMetric,
          body.storage?.configured ? "ok" : "warn",
          body.storage?.configured ? "Configured" : "Not configured",
          storageDetail
        );

        setMetric(
          exportMetric,
          body.export?.configured ? "ok" : "warn",
          body.export?.configured ? "Configured" : "Not configured",
          body.export?.configured ? "Protected access enabled" : "EXPORT_TOKEN missing"
        );
      } catch (error) {
        setMetric(dynamicMetric, "warn", "Unavailable", error.message || "Health check failed");
        setMetric(storageMetric, "warn", "Unknown", "Storage status unavailable");
        setMetric(exportMetric, "warn", "Unknown", "Token status unavailable");
      }
    }

    function cell(value, key) {
      const td = document.createElement("td");
      if (key === "summary") td.className = "summary-cell";
      td.textContent = value === undefined || value === null || value === "" ? "-" : String(value);
      return td;
    }

    function renderRows(rows) {
      if (!rows.length) {
        contentEl.className = "empty";
        contentEl.textContent = "No stored submissions yet.";
        return;
      }

      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      for (const [, label] of columns) {
        const th = document.createElement("th");
        th.textContent = label;
        headRow.append(th);
      }
      thead.append(headRow);
      table.append(thead);

      const tbody = document.createElement("tbody");
      for (const row of rows.slice().reverse()) {
        const tr = document.createElement("tr");
        for (const [key] of columns) tr.append(cell(row[key], key));
        tbody.append(tr);
      }
      table.append(tbody);
      wrap.append(table);
      contentEl.className = "";
      contentEl.replaceChildren(wrap);
    }

    async function refresh() {
      refreshButton.disabled = true;
      setStatus("Checking storage...");
      try {
        const storageResponse = await fetchWithToken("/api/storage-health");
        const storageBody = await storageResponse.json().catch(() => ({}));
        if (!storageResponse.ok) throw new Error(storageBody.error || `Storage check failed: ${storageResponse.status}`);
        setMetric(storageMetric, "ok", "Readable", storageBody.table || "Supabase table ready");

        setStatus("Loading results...");
        const response = await fetchWithToken("/api/results");
        const body = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(body.error || `Request failed: ${response.status}`);
        summaryEl.textContent = `${body.count} stored submission${body.count === 1 ? "" : "s"}`;
        renderRows(body.rows || []);
        setStatus("Results loaded.", "ok");
      } catch (error) {
        setStatus(error.message || "Unable to load results.", "error");
      } finally {
        refreshButton.disabled = false;
      }
    }

    async function downloadCsv() {
      downloadButton.disabled = true;
      setStatus("Preparing CSV...");
      try {
        const response = await fetchWithToken("/api/export.csv");
        const text = await response.text();
        if (!response.ok) throw new Error(text.trim() || `Request failed: ${response.status}`);
        const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "ai-ideology-results.csv";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("CSV downloaded.", "ok");
      } catch (error) {
        setStatus(error.message || "Unable to download CSV.", "error");
      } finally {
        downloadButton.disabled = false;
      }
    }

    refreshButton.addEventListener("click", refresh);
    downloadButton.addEventListener("click", downloadCsv);
    tokenInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") refresh();
    });
    checkHealth();
  </script>
</body>
</html>
