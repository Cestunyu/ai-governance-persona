<html lang="en">
<head>
  <meta charset="utf-8">

  <title>AI Governance Spectrum</title>

  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --surface: #fff;
      --soft: #fbfcfe;
      --ink: #17202a;
      --muted: #657386;
      --line: #d9dee8;
      --accent: #0f766e;
      --shadow: 0 10px 28px rgba(20, 31, 52, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    a { color: inherit; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(217, 222, 232, 0.92);
      background: rgba(245, 246, 248, 0.94);
      backdrop-filter: blur(14px);
    }
    .topbar-inner, main {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar-inner {
      min-height: 54px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand { font-weight: 850; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
      text-decoration: none;
    }
    .btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    main { padding: 22px 0 44px; }
    .hero, .map-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .hero { display: grid; gap: 10px; margin-bottom: 14px; padding: 18px; }
    h1 { margin: 0; font-size: clamp(26px, 5vw, 42px); line-height: 1.1; letter-spacing: 0; }
    .hero p { max-width: 820px; margin: 0; color: #344054; font-size: 14px; line-height: 1.65; }
    .map-card {
      margin-bottom: 14px;
      overflow: hidden;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }
    .map-head h2 { margin: 0; font-size: 16px; }
    .map-head span { color: var(--muted); font-size: 12px; font-weight: 750; text-align: right; }
    .map-plot {
      position: relative;
      width: min(100%, 680px);
      aspect-ratio: 1 / 1;
      margin: 16px auto 12px;
      border: 1px solid #cfd8e5;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08), transparent 42%, transparent 58%, rgba(21, 94, 239, 0.08)),
        linear-gradient(0deg, rgba(183, 121, 31, 0.08), transparent 42%, transparent 58%, rgba(15, 118, 110, 0.08)),
        #fbfcfe;
    }
    .map-axis {
      position: absolute;
      background: rgba(23, 32, 42, 0.18);
      pointer-events: none;
      z-index: 1;
    }
    .map-axis.horizontal { left: 0; right: 0; top: 50%; height: 1px; }
    .map-axis.vertical { top: 0; bottom: 0; left: 50%; width: 1px; }
    .map-label {
      position: absolute;
      padding: 5px 7px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.86);
      color: #344054;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.15;
      box-shadow: 0 1px 4px rgba(20, 31, 52, 0.08);
      z-index: 5;
      pointer-events: none;
    }
    .map-label.top { top: 8px; left: 50%; transform: translateX(-50%); }
    .map-label.bottom { bottom: 8px; left: 50%; transform: translateX(-50%); }
    .map-label.left { left: 8px; top: 50%; transform: translateY(-50%); }
    .map-label.right { right: 8px; top: 50%; transform: translateY(-50%); }
    .reference-layer { position: absolute; inset: 0; z-index: 2; }
    .reference-point {
      position: absolute;
      left: var(--left);
      bottom: var(--bottom);
      transform: translate(calc(-50% + var(--dx)), calc(50% + var(--dy)));
      display: block;
      width: var(--size);
      height: var(--size);
      border: 0;
      background: transparent;
      color: var(--color);
      cursor: pointer;
      font: inherit;
      font-size: 10px;
      font-weight: 820;
      line-height: 1.05;
      padding: 0;
      text-align: left;
    }
    .reference-point::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--color);
      box-shadow: 0 2px 8px rgba(20, 31, 52, 0.18);
      transition: box-shadow 120ms ease, transform 120ms ease;
    }
    .reference-point.active { z-index: 6; }
    .reference-point.active::before,
    .reference-point:hover::before,
    .reference-point:focus-visible::before {
      transform: scale(1.16);
      box-shadow: 0 0 0 3px #fff, 0 0 0 6px var(--color), 0 8px 18px rgba(20, 31, 52, 0.18);
    }
    .reference-label {
      position: absolute;
      top: 50%;
      display: inline-block;
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 3px 5px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 1px 4px rgba(20, 31, 52, 0.08);
      pointer-events: auto;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .reference-point.label-right .reference-label { left: calc(var(--size) + 5px); transform: translateY(-50%); }
    .reference-point.label-left .reference-label { right: calc(var(--size) + 5px); transform: translateY(-50%); text-align: right; }
    .reference-point.active .reference-label,
    .reference-point:hover .reference-label,
    .reference-point:focus-visible .reference-label {
      border-color: var(--color);
      background: #fff;
      box-shadow: 0 5px 14px rgba(20, 31, 52, 0.14);
    }
    .map-dot {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translate(-50%, 50%);
      display: grid;
      place-items: center;
      min-width: 56px;
      height: 40px;
      padding: 0 10px;
      border: 3px solid #fff;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.25);
      z-index: 3;
    }
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 0 14px 10px;
    }
    .map-legend span,
    .map-legend button {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfe;
      color: #344054;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 780;
      line-height: 1.1;
    }
    .map-legend button {
      cursor: pointer;
      font: inherit;
    }
    .map-legend button:hover,
    .map-legend button:focus-visible {
      border-color: var(--color);
      background: #fff;
      box-shadow: 0 3px 10px rgba(20, 31, 52, 0.12);
      outline: none;
    }
    .map-legend i { display: inline-block; width: 10px; height: 10px; flex: 0 0 auto; border-radius: 999px; }
    .reference-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow-y: auto;
    }
    .reference-modal[hidden] { display: none; }
    .reference-modal-backdrop { position: absolute; inset: 0; background: rgba(18, 25, 38, 0.42); }
    .reference-modal-card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(20, 31, 52, 0.24);
      padding: 14px;
      max-height: calc(100vh - 36px);
      overflow-y: auto;
    }
    .reference-modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 18px;
      font-weight: 820;
      cursor: pointer;
    }
    .reference-detail {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 13px 44px 13px 13px;
      min-height: 78px;
    }
    .reference-detail-head { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .reference-detail-head b { font-size: 14px; line-height: 1.25; }
    .reference-detail-badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      border: 1px solid var(--color);
      border-radius: 999px;
      background: #fff;
      color: var(--color);
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 820;
      line-height: 1.1;
    }
    .reference-detail p { margin: 7px 0 0; color: #3a4454; font-size: 12px; line-height: 1.5; }
    .reference-detail a { color: #0f5fbb; text-decoration: underline; text-underline-offset: 2px; }
    .reference-note-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .reference-note {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
    }
    button.reference-note {
      width: 100%;
      color: inherit;
      cursor: pointer;
      font: inherit;
      text-align: left;
    }
    button.reference-note:hover,
    button.reference-note:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(20, 31, 52, 0.12);
      outline: none;
    }
    .reference-note span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 820;
      line-height: 1.2;
    }
    .reference-note p,
    .reference-note ul {
      margin: 6px 0 0;
    }
    .reference-note p + p {
      margin-top: 8px;
    }
    .reference-note a {
      color: var(--accent);
      font-weight: 780;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 118, 110, 0.32);
    }
    .reference-note a:hover {
      border-bottom-color: var(--accent);
    }
    @media (max-width: 760px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; padding: 8px 0; }
      main { padding-top: 10px; }
      .hero { padding: 14px; }
      .map-plot { width: 100%; margin: 8px 0; }
      .reference-point { --size: 8px !important; font-size: 9px; }
      .reference-label { max-width: 84px; }
      .map-legend { padding: 0 8px 8px; }
    }
  </style>
</head>

  "peter-thiel": "The central problem is stagnation; the future needs deep-tech breakthroughs, strong founders, and vertical progress rather than risk-averse bureaucracy.",
  "ray-kurzweil": "Exponential progress in computing, AI, life sciences, and nanotechnology points toward the singularity and human-machine merger.",
  "marc-andreessen": "AI should be developed aggressively because technological progress can expand abundance, solve problems, and empower people.",
  "effective-accelerationism": "Technological acceleration is treated as a moral and civilizational task, while regulation and pause politics are often seen as larger risks.",
  "nick-land": "Capital, technology, and intelligence are imagined as autonomous acceleration processes that exceed humanist control."
}

  </script>
  <script>
    const referencePoints = JSON.parse(document.querySelector("#referenceData").textContent);
    const referenceProfiles = JSON.parse(document.querySelector("#referenceProfilesData").textContent);
    const referenceDetails = JSON.parse(document.querySelector("#referenceDetailsData").textContent);
    const referenceSources = Object.fromEntries(referencePoints.map((point) => [
      point.id,
      { title: point.sourceTitle, url: point.source }
    ]));
    const categoryInfo = {
      "X-risk safety": { label: "X-risk / alignment safety", color: "#b42318" },
      "Catholic social humanism": { label: "Catholic social humanism / human dignity", color: "#9a3412" },
      "Frontier lab governance": { label: "Frontier lab governance", color: "#0f766e" },
      "Critical AI": { label: "Critical AI / social harm", color: "#7c3aed" },
      "Normal technology": { label: "Normal technology / contextual governance", color: "#475569" },
      "Hype skepticism": { label: "AI hype skepticism / demystification", color: "#64748b" },
      "Scaling thought": { label: "Scaling / Bitter Lesson", color: "#0369a1" },
      "Architecture optimism": { label: "Architecture optimism / world models", color: "#4f46e5" },
      "Posthuman control": { label: "Posthuman control / system governance", color: "#5b21b6" },
      "Pragmatic optimism": { label: "Pragmatic AI optimism", color: "#15803d" },
      "Techno-libertarianism": { label: "Techno-libertarianism / anti-stagnation", color: "#a16207" },
      "Techno-optimism": { label: "Techno-optimism / singularity", color: "#c2410c" },
      "Accelerationism": { label: "Accelerationism / posthuman edge", color: "#7f1d1d" }
    };
    const referenceLayer = document.querySelector("#referenceLayer");
    const mapLegend = document.querySelector("#mapLegend");
    const referenceModal = document.querySelector("#referenceModal");
    const referenceDetail = document.querySelector("#referenceDetail");
    let activeReferenceId = "";

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[char]);
    }
    function coordToReferencePercent(value) {
      return Math.max(0, Math.min(100, 7 + ((value + 2) / 4) * 86));
    }
    function quadrantFor(x, y) {
      const horizontal = x < -0.35 ? "control threshold" : x > 0.35 ? "open deployment" : "middle governance";
      const vertical = y > 0.35 ? "human / social-structure centered" : y < -0.35 ? "posthuman / intelligence centered" : "middle value position";
      return `${horizontal} / ${vertical}`;
    }
    function renderMapLegend() {
      mapLegend.innerHTML = Object.entries(categoryInfo).map(([category, info]) => `
        <button type="button" data-category="${escapeHTML(category)}" style="--color:${escapeHTML(info.color)}"><i style="background:${escapeHTML(info.color)}"></i>${escapeHTML(info.label)}</button>
      `).join("");
    }
    function renderReferencePoints() {
      referenceLayer.innerHTML = referencePoints.map((point) => {
        const size = 8 + point.influence * 1.2;
        const info = categoryInfo[point.category] || categoryInfo["Normal technology"];
        const labelSide = point.x > 0.85 ? "label-left" : "label-right";
        const isActive = activeReferenceId === point.id;
        return `
          <button class="reference-point ${labelSide}${isActive ? " active" : ""}" type="button" data-id="${escapeHTML(point.id)}" aria-pressed="${isActive ? "true" : "false"}" style="--left:${coordToReferencePercent(point.x)}%; --bottom:${coordToReferencePercent(point.y)}%; --dx:${point.dx}; --dy:${point.dy}; --size:${size}px; --color:${escapeHTML(info.color)};" title="${escapeHTML(point.name)} · ${escapeHTML(point.cluster)}">
            <span class="reference-label">${escapeHTML(point.label)}</span>
          </button>
        `;
      }).join("");
    }
    function renderReferenceNotes(point, detail, stance) {
      const core = detail?.core || stance;
      const lineage = detail?.lineage || "This reference point does not yet have a full intellectual lineage note.";
      const placement = detail?.placement || `This reference point sits near ${quadrantFor(point.x, point.y)} because its public arguments are closest to ${point.cluster}.`;
      const focus = detail?.focus || "Read it as a neighboring reference point, not as proof that every view in the same region is identical.";
      const counter = detail?.counter || "";
      const works = detail?.works || [];
      const source = referenceSources[point.id];
      const sourceLink = source
        ? `<p>Main reference: <a href="${escapeHTML(source.url)}" target="_blank" rel="noreferrer">${escapeHTML(source.title)}</a></p>`
        : "";
      const worksLine = works.length ? `<p>Related texts: ${works.map(escapeHTML).join(" · ")}</p>` : "";
      return `
        <div class="reference-note-grid">
          <div class="reference-note">
            <span>Core Claim</span>
            <p>${escapeHTML(core)}</p>
            <p>${escapeHTML(placement)}</p>
            <p>${escapeHTML(focus)}</p>
          </div>
          ${counter ? `<div class="reference-note"><span>Contrast</span><p>${escapeHTML(counter)}</p></div>` : ""}
          <div class="reference-note">
            <span>Intellectual Lineage</span>
            <p>${escapeHTML(lineage)}</p>
            ${sourceLink}
            ${worksLine}
          </div>
        </div>
      `;
    }
    function openReference(point) {
      activeReferenceId = point.id;
      renderReferencePoints();
      const info = categoryInfo[point.category] || categoryInfo["Normal technology"];
      const stance = referenceProfiles[point.id] || point.cluster;
      const detail = referenceDetails[point.id];
      referenceDetail.innerHTML = `
        <div class="reference-detail-head">
          <b id="referenceModalTitle">${escapeHTML(point.name)}</b>
          <span class="reference-detail-badge" style="--color:${escapeHTML(info.color)}">${escapeHTML(info.label)}</span>
        </div>
        ${renderReferenceNotes(point, detail, stance)}
      `;
      referenceModal.hidden = false;
    }
    function openCategory(category) {
      const info = categoryInfo[category];
      if (!info) return;
      const points = referencePoints.filter((point) => point.category === category);
      if (points.length === 1) {
        openReference(points[0]);
        return;
      }
      activeReferenceId = "";
      renderReferencePoints();
      referenceDetail.innerHTML = `
        <div class="reference-detail-head">
          <b id="referenceModalTitle">${escapeHTML(info.label)}</b>
          <span class="reference-detail-badge" style="--color:${escapeHTML(info.color)}">${points.length} references</span>
        </div>
        <div class="reference-note-grid">
          ${points.map((point) => `
            <button class="reference-note" type="button" data-reference-id="${escapeHTML(point.id)}" style="text-align:left; cursor:pointer;">
              <span>${escapeHTML(point.label)}</span>
              <p><b>${escapeHTML(point.name)}</b></p>
              <p>${escapeHTML(point.cluster)}</p>
            </button>
          `).join("")}
        </div>
      `;
      referenceModal.hidden = false;
    }
    function closeReference() {
      activeReferenceId = "";
      renderReferencePoints();
      referenceModal.hidden = true;
    }
    referenceLayer.addEventListener("click", (event) => {
      const target = event.target.closest(".reference-point");
      if (!target) return;
      const point = referencePoints.find((item) => item.id === target.dataset.id);
      if (point) openReference(point);
    });
    mapLegend.addEventListener("click", (event) => {
      const target = event.target.closest("[data-category]");
      if (!target) return;
      openCategory(target.dataset.category);
    });
    referenceModal.addEventListener("click", (event) => {
      const referenceTarget = event.target.closest("[data-reference-id]");
      if (referenceTarget) {
        const point = referencePoints.find((item) => item.id === referenceTarget.dataset.referenceId);
        if (point) openReference(point);
        return;
      }
      if (event.target.matches("[data-reference-close]")) closeReference();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !referenceModal.hidden) closeReference();
    });
    renderMapLegend();
    renderReferencePoints();
  </script>
