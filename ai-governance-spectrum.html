  <title>AI 治理光谱</title>

  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --surface: #fff;
      --soft: #fbfcfe;
      --ink: #17202a;
      --muted: #657386;
      --line: #d9dee8;
      --accent: #0f766e;
      --shadow: 0 10px 28px rgba(20, 31, 52, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    a { color: inherit; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(217, 222, 232, 0.92);
      background: rgba(245, 246, 248, 0.94);
      backdrop-filter: blur(14px);
    }
    .topbar-inner, main {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar-inner {
      min-height: 54px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand { font-weight: 850; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
      text-decoration: none;
    }
    .btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    main { padding: 22px 0 44px; }
    .hero, .map-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .hero { display: grid; gap: 10px; margin-bottom: 14px; padding: 18px; }
    h1 { margin: 0; font-size: clamp(26px, 5vw, 42px); line-height: 1.1; letter-spacing: 0; }
    .hero p { max-width: 820px; margin: 0; color: #344054; font-size: 14px; line-height: 1.65; }
    .map-card {
      margin-bottom: 14px;
      overflow: hidden;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }
    .map-head h2 { margin: 0; font-size: 16px; }
    .map-head span { color: var(--muted); font-size: 12px; font-weight: 750; text-align: right; }
    .map-plot {
      position: relative;
      width: min(100%, 680px);
      aspect-ratio: 1 / 1;
      margin: 16px auto 12px;
      border: 1px solid #cfd8e5;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08), transparent 42%, transparent 58%, rgba(21, 94, 239, 0.08)),
        linear-gradient(0deg, rgba(183, 121, 31, 0.08), transparent 42%, transparent 58%, rgba(15, 118, 110, 0.08)),
        #fbfcfe;
    }
    .map-axis {
      position: absolute;
      background: rgba(23, 32, 42, 0.18);
      pointer-events: none;
      z-index: 1;
    }
    .map-axis.horizontal { left: 0; right: 0; top: 50%; height: 1px; }
    .map-axis.vertical { top: 0; bottom: 0; left: 50%; width: 1px; }
    .map-label {
      position: absolute;
      padding: 5px 7px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.86);
      color: #344054;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.15;
      box-shadow: 0 1px 4px rgba(20, 31, 52, 0.08);
      z-index: 5;
      pointer-events: none;
    }
    .map-label.top { top: 8px; left: 50%; transform: translateX(-50%); }
    .map-label.bottom { bottom: 8px; left: 50%; transform: translateX(-50%); }
    .map-label.left { left: 8px; top: 50%; transform: translateY(-50%); }
    .map-label.right { right: 8px; top: 50%; transform: translateY(-50%); }
    .reference-layer { position: absolute; inset: 0; z-index: 2; }
    .reference-point {
      position: absolute;
      left: var(--left);
      bottom: var(--bottom);
      transform: translate(calc(-50% + var(--dx)), calc(50% + var(--dy)));
      display: block;
      width: var(--size);
      height: var(--size);
      border: 0;
      background: transparent;
      color: var(--color);
      cursor: pointer;
      font: inherit;
      font-size: 10px;
      font-weight: 820;
      line-height: 1.05;
      padding: 0;
      text-align: left;
    }
    .reference-point::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--color);
      box-shadow: 0 2px 8px rgba(20, 31, 52, 0.18);
      transition: box-shadow 120ms ease, transform 120ms ease;
    }
    .reference-point.active { z-index: 6; }
    .reference-point.active::before,
    .reference-point:hover::before,
    .reference-point:focus-visible::before {
      transform: scale(1.16);
      box-shadow: 0 0 0 3px #fff, 0 0 0 6px var(--color), 0 8px 18px rgba(20, 31, 52, 0.18);
    }
    .reference-label {
      position: absolute;
      top: 50%;
      display: inline-block;
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 3px 5px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 1px 4px rgba(20, 31, 52, 0.08);
      pointer-events: none;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .reference-point.label-right .reference-label { left: calc(var(--size) + 5px); transform: translateY(-50%); }
    .reference-point.label-left .reference-label { right: calc(var(--size) + 5px); transform: translateY(-50%); text-align: right; }
    .reference-point.active .reference-label,
    .reference-point:hover .reference-label,
    .reference-point:focus-visible .reference-label {
      border-color: var(--color);
      background: #fff;
      box-shadow: 0 5px 14px rgba(20, 31, 52, 0.14);
    }
    .map-dot {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translate(-50%, 50%);
      display: grid;
      place-items: center;
      min-width: 56px;
      height: 40px;
      padding: 0 10px;
      border: 3px solid #fff;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.25);
      z-index: 3;
    }
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 0 14px 10px;
    }
    .map-legend span {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfe;
      color: #344054;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 780;
      line-height: 1.1;
    }
    .map-legend i { display: inline-block; width: 10px; height: 10px; flex: 0 0 auto; border-radius: 999px; }
    .reference-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow-y: auto;
    }
    .reference-modal[hidden] { display: none; }
    .reference-modal-backdrop { position: absolute; inset: 0; background: rgba(18, 25, 38, 0.42); }
    .reference-modal-card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(20, 31, 52, 0.24);
      padding: 14px;
      max-height: calc(100vh - 36px);
      overflow-y: auto;
    }
    .reference-modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 18px;
      font-weight: 820;
      cursor: pointer;
    }
    .reference-detail {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 13px 44px 13px 13px;
      min-height: 78px;
    }
    .reference-detail-head { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .reference-detail-head b { font-size: 14px; line-height: 1.25; }
    .reference-detail-badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      border: 1px solid var(--color);
      border-radius: 999px;
      background: #fff;
      color: var(--color);
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 820;
      line-height: 1.1;
    }
    .reference-detail p { margin: 7px 0 0; color: #3a4454; font-size: 12px; line-height: 1.5; }
    .reference-detail a { color: #0f5fbb; text-decoration: underline; text-underline-offset: 2px; }
    .reference-note-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .reference-note {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
    }
    .reference-note span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 820;
      line-height: 1.2;
    }
    .reference-note p,
    .reference-note ul {
      margin: 6px 0 0;
    }
    .reference-note p + p {
      margin-top: 8px;
    }
    .reference-note a {
      color: var(--accent);
      font-weight: 780;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 118, 110, 0.32);
    }
    .reference-note a:hover {
      border-bottom-color: var(--accent);
    }
    @media (max-width: 760px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; padding: 8px 0; }
      main { padding-top: 10px; }
      .hero { padding: 14px; }
      .map-plot { width: 100%; margin: 8px 0; }
      .reference-point { --size: 8px !important; font-size: 9px; }
      .reference-label { max-width: 84px; }
      .map-legend { padding: 0 8px 8px; }
    }
  </style>

{"eliezer-yudkowsky":"先进 AI 在部署前如果没有解决 alignment，很可能杀死人类。","nick-bostrom":"超级智能可能追求工具性目标，从而威胁人类控制权。","stuart-russell":"AI 应围绕人类偏好的不确定性来设计，并证明它对人类有益。","pope-leo-xiv":"AI 应服务人的尊严、共同善和弱者保护；技术权力需要公共责任、治理，并从支配逻辑中被解除。","paul-christiano":"先进 AI 失败可能来自逐步委托、错配目标和可扩展监督失效。","ajeya-cotra":"transformative AI 时间线可以用算力需求和生物锚点来预测。","dario-amodei-anthropic":"AI 有巨大收益，但前沿 scaling 需要明确 safety、evals 和部署门槛。","dan-hendrycks-cais":"AI 应被当作社会规模风险来处理，类似其他重大全球风险。","bender-gebru-mitchell-mcmillan-major":"大语言模型带来社会、环境、劳动、数据和表示伤害，而 scale 叙事会遮蔽这些问题。","kate-crawford":"AI 是物质、劳动、数据和权力基础设施，不是脱离现实的纯智能。","ruha-benjamin":"自动化系统会复制并强化种族等级，却把自己包装成中立客观。","ai-as-normal-technology":"AI 应被当作重要但普通的技术来评估：看场景、失败模式、制度责任和可验证收益。","narayanan-kapoor":"AI 很强但经常被过度包装，评估要区分真实能力、神药话术 (snake oil) 和魔法 AGI 叙事。","gary-marcus-melanie-mitchell":"当前深度学习很强但脆弱，未必足以实现稳健通用智能。","rich-sutton":"利用搜索、学习和计算的一般方法，最终会胜过手工编码人类领域知识。","benjamin-bratton":"以行星尺度计算、Stack 和 synthetic intelligence 理解治理；重点不是开放加速，而是强系统治理和非传统人类/社会结构中心框架。","yann-lecun":"先进 AI 需要新架构和世界模型，近期毁灭叙事被夸大了。","andrew-ng":"AI 像电力一样是通用技术，应该广泛部署来创造价值。","sam-altman-openai":"AGI 如果配合安全、治理和收益共享制度，可以带来广泛丰裕。","elon-musk-xai":"AI 可能带来极端风险，因此需要安全意识；但人类也应通过火星、Neuralink、xAI 和更强智能扩展自身边界。","peter-thiel":"现代社会最大问题是技术停滞；未来需要少数强创始人和深科技突破，而不是让风险治理、官僚和共识政治冻结进步。","ray-kurzweil":"AI 与计算推动技术进步走向奇点，以及人机融合。","marc-andreessen":"AI 应该积极发展，因为它能扩展丰裕、解决问题并赋能个体。","effective-accelerationism":"技术加速具有道德紧迫性，监管本身常被视为更大的危险。","nick-land":"资本、技术和智能被想象成超过人类主义控制的自主失控过程。"}
  </script>
  <script type="application/json" id="referenceDetailsData">
{"eliezer-yudkowsky":{"core":"如果在能力起飞前没有解决 alignment，先进 AI 很可能以不可逆方式夺走人类未来；安全问题不是产品事故，而是生存风险。","lineage":"Eliezer Yudkowsky 在 2000s-2020s 的 LessWrong 理性主义与 MIRI alignment 语境中发展出这一立场，并在 2022 年的 AGI Ruin: A List of Lethalities 中集中表达。它提出的问题不是今天的模型是否已经危险，而是如果通用智能在部署后才被尝试对齐，是否已经太晚。该论证来自决策理论、智能爆炸和制度失灵判断，影响是把 hard takeoff、p(doom)、暂停式 safety 变成 AI safety 话语的核心参照。","placement":"放在最左侧，因为它支持极高部署门槛和暂停式安全优先；纵轴仍偏人类中心，因为核心目标是保住人类控制权和人类未来。","focus":"读它时要抓住一个逻辑链：能力增长可能很快，目标错配会被放大，人类很难在部署后补救。","counter":"Russell/Christiano 更强调可设计的 corrigibility 和监督制度；e/acc 认为这种暂停逻辑会牺牲进步本身。","works":["AGI Ruin: A List of Lethalities","List of Lethalities","Shut It All Down"]},"nick-bostrom":{"core":"超级智能可能以工具性目标追求资源、权力和自我保存；即使最终目标看似无害，也可能威胁人类控制。","lineage":"Nick Bostrom 2014 年在 Oxford Future of Humanity Institute 语境中出版 Superintelligence，把未来世代伦理、存在风险和 transhumanism 转化为机器超级智能的战略风险理论。他提出的问题是：如果系统能力超过人类，但最终目标并不等同于人类目标，会发生什么。orthogonality thesis 和 instrumental convergence 使这一风险获得可迁移的概念语言，影响了后来的 AI safety、慈善资助和政策讨论。","placement":"左侧是因为它强调前沿能力前的控制问题；纵轴偏人类中心，因为风险来自人类目标无法约束更强智能。","focus":"重点不是某个模型今天会怎样，而是当智能系统具有战略能力后，目标错配为什么会变成结构性问题。","counter":"Yudkowsky 更激进地强调失败几乎默认发生；Normal Technology 视角则认为这种远期抽象风险容易压过具体治理。","works":["Superintelligence","The Vulnerable World Hypothesis","Existential risk writings"]},"stuart-russell":{"core":"AI 不应被设计成确定地最大化固定目标，而应承认人类偏好的不确定性，并保持可纠正、可关闭、可监督。","lineage":"Stuart Russell 作为 Artificial Intelligence: A Modern Approach 的共同作者，在 2019 年 Human Compatible 中把经典 AI 的目标设定假设转向 beneficial AI 问题。他提出的问题是：如果人类偏好并不确定、并不完整，而且只能在互动中显露，机器应如何行动。该路线把安全从纯哲学警告改写为 preference uncertainty、assistance games、inverse reinforcement learning 和 corrigibility 等设计原则。","placement":"控制门槛较高，因为它要求系统先证明对人类有益；纵轴最高，因为最终标准仍是人类偏好、责任和可纠正性。","focus":"看它如何把安全从恐惧叙事改写成工程目标：机器越强，越需要知道自己不知道人类真正想要什么。","counter":"Yudkowsky 认为这种方案可能仍低估难度；加速派认为它会把部署速度交给专家和监管。","works":["Human Compatible","Human-Compatible Artificial Intelligence","Assistance games"]},"pope-leo-xiv":{"core":"AI 应服务人的尊严、共同善、劳动者和弱者保护；技术权力需要公共责任，不能把人降为优化对象。","lineage":"Pope Leo XIV 在 2026 年 5 月发布 Magnifica Humanitas，把 AI 放入 Catholic social teaching 的长传统中：从 Leo XIII 1891 年 Rerum Novarum 对工业资本主义和劳动问题的回应，到尊严、团结、共同善和技术支配的现代议题。它提出的问题是 AI 能否服务人，而不是把人变成数据、劳动投入或 domination 的对象。潜在影响是把人类尊严、劳动保护、真理和反支配纳入更广泛的 AI governance 道德语言。","placement":"左上方是因为它重视治理、问责和社会边界；纵轴很高，因为人不是效率函数里的变量，而是技术秩序必须服务的主体。","focus":"重点不是反技术，而是技术必须被嵌入关于人、共同体和权力限制的伦理框架。","counter":"Techno-optimist 传统更相信增长会解决许多问题；posthuman 传统则会质疑人类尊严是否应当是最终坐标。","works":["Catholic social teaching on technology","AI ethics and human dignity addresses","Magnifica Humanitas"]},"paul-christiano":{"core":"先进 AI 的失败可能不是突然邪恶化，而是在逐步委托、监督不足和目标错配中变成系统性失控。","lineage":"Paul Christiano 在 2018-2019 年 Alignment Forum / LessWrong 语境中写作 What Failure Looks Like，提出的问题是：AI 失败是否可能不是突然政变式失控，而是在经济委托、代理目标和监督不足中逐步发生。它之所以重要，是因为它把 intent alignment 从抽象灾难改成了可分析的制度和技术链条。后续影响包括 scalable oversight、iterated amplification、ELK、reward modeling 和 delegated cognition 等研究议程。","placement":"偏左但不极端，因为它强调技术监督和治理门槛；纵轴偏人类中心，因为目标是让系统忠实服务人类意图。","focus":"读它时要看监督链条：人类无法直接评估复杂任务时，怎样避免 AI 学会迎合指标而不是真实意图。","counter":"Yudkowsky 认为这些方案仍过于乐观；Normal Technology 视角会问这些技术失败是否真不同于普通系统事故。","works":["What Failure Looks Like","Iterated amplification","ELK and scalable oversight discussions"]},"ajeya-cotra":{"core":"transformative AI 的到来可以用生物锚点和算力需求估计；安全和政策需要按时间线提前准备。","lineage":"Ajeya Cotra 2020 年为 Open Philanthropy 写作 Forecasting Transformative AI with Biological Anchors，问题是能否用训练算力、生物类比和模型规模来估计 transformative AI 时间线，而不是只凭直觉判断。该文本产生于 longtermist 资助和政策准备语境，其影响是把 timelines、training compute、biological anchors 变成 AI risk 优先级讨论中的标准工具，即使很多人并不接受单一日期预测。","placement":"左侧是因为它认真对待 transformative AI 风险；纵轴偏人类中心，因为关注的是人类社会如何提前治理和分配注意力。","focus":"核心不是某个具体年份，而是如何用模型把不确定未来变成可讨论的准备问题。","counter":"炒作怀疑派 (hype skeptics) 认为时间线模型可能过度依赖规模化 (scaling) 假设；加速派认为提前设限会拖慢收益。","works":["Forecasting Transformative AI with Biological Anchors","Open Phil AI timelines work"]},"dario-amodei-anthropic":{"core":"前沿 AI 有巨大正面潜力，但 scaling 带来的风险必须通过 evals、responsible scaling 和部署门槛管理。","lineage":"Dario Amodei 的位置由 Anthropic 语境中的三个文本构成：2022 年 Constitutional AI、2023 年 Responsible Scaling Policy、2024 年 Machines of Loving Grace。它提出的问题是：前沿实验室在继续 scaling 的同时，能否用 evals、分级部署和安全阈值避免完全暂停与无条件加速之间的二分。其影响是一种 frontier-lab governance 风格：用 safety engineering 和 institutional commitments 为追求巨大 upside 提供正当性。","placement":"靠近中左，因为它不是反部署，而是主张受控地部署；纵轴偏人类中心，因为收益叙事仍服务医疗、科研、治理等人类目标。","focus":"看它如何在实验室现实中调和两件事：继续 build，同时用门槛和 evals 降低灾难性风险。","counter":"Critical AI 认为实验室自我治理不足以处理权力集中；e/acc 认为 responsible scaling 仍是减速。","works":["Machines of Loving Grace","Responsible Scaling Policy","Constitutional AI"]},"dan-hendrycks-cais":{"core":"AI 风险应像核风险、疫情和气候风险一样被纳入全球风险治理，而不只是技术社区内部问题。","lineage":"Dan Hendrycks 和 Center for AI Safety 在 2022 年 X-Risk Analysis for AI Research 与 2023 年 5 月 Statement on AI Risk 中，把 ML safety、misuse、autonomy 和 extinction risk 转化为面向政策和公众的风险框架。它提出的问题是如何让极端风险在不预设完整 LessWrong takeoff 模型的情况下仍然可被机构理解。影响是让“AI extinction risk”以极短声明进入主流科学家、企业领袖和政策议程。","placement":"左侧是因为它支持把危险能力纳入公共安全门槛；纵轴偏人类中心，因为核心是保护社会免受系统性风险。","focus":"重点是风险议程的社会化：把 AI risk 从论坛论证转成政策、标准和机构问题。","counter":"Bender/Gebru 一派会质疑 x-risk 话语是否遮蔽当下伤害；加速派则认为它制造暂停联盟。","works":["Statement on AI Risk","CAIS AI risk work","ML safety papers"]},"bender-gebru-mitchell-mcmillan-major":{"core":"大语言模型的规模化会放大数据剥削、环境成本、偏见、劳动问题和权力集中，而炒作 (hype) 会遮蔽这些现实伤害。","lineage":"Emily Bender、Timnit Gebru、Angelina McMillan-Major 与 Margaret Mitchell 在 2021 年 FAccT 论文 On the Dangers of Stochastic Parrots 中，介入了大语言模型规模化竞赛。她们提出的问题是：基准测试 (benchmark) 能力背后隐藏了哪些环境、数据、劳动、表征和制度成本。该文影响了 critical AI 对语言模型的基本批判框架，把讨论从能力表演转向数据抽取、文档化、权力和问责。","placement":"上方是因为它强烈坚持社会问责和受影响群体；偏左是因为它支持更强审计、限制和机构责任。","focus":"读它时要看模型背后的社会基础设施：谁的数据、谁的劳动、谁承担错误，谁从规模化中获利。","counter":"X-risk safety 认为未来失控风险更大；techno-optimists 认为这种批判低估通用技术收益。","works":["On the Dangers of Stochastic Parrots","FAccT / critical NLP debates"]},"kate-crawford":{"core":"AI 是由矿产、能源、数据、劳工和国家/企业权力构成的物质基础设施，不是抽象的智能云。","lineage":"Kate Crawford 2021 年由 Yale University Press 出版 Atlas of AI，此前已有十余年关于 AI 社会影响、数据政治和 AI Now Institute 的研究积累。她提出的问题是：如果 AI 不是抽象算法，而是一套矿物、能源、标注劳动、数据分类和国家权力构成的基础设施，它究竟是什么。影响是把 extractive capitalism、环境成本和政治经济学推入 AI ethics 的核心。","placement":"上方是因为它关注权力、劳动和社会后果；偏左是因为它要求制度约束，而不是把部署速度当作默认善。","focus":"重点是把 AI 去神秘化：模型能力之外，还有供应链、标注劳动、数据采集和治理权力。","counter":"Andrew Ng 式部署乐观更强调应用收益；Sutton 式计算中心主义更少讨论物质和劳动基础。","works":["Atlas of AI","AI Now Institute work","The politics of data and extraction"]},"ruha-benjamin":{"core":"自动化系统常把种族和社会等级包装成中立技术，通过预测、评分和治理流程复制不平等。","lineage":"Ruha Benjamin 2019 年出版 Race After Technology，在算法偏见、警务、医疗和平台权力讨论中提出 New Jim Code。她提出的问题是：为什么看似中立的技术系统会继续复制种族层级和惩罚结构。影响是把 AI ethics 与 abolitionist critique、race and technology studies 以及制度设计问题连接起来，而不是只停留在去偏技术修补。","placement":"上方是因为它强烈强调受影响群体、权利和社会正义；偏左是因为它怀疑无审计部署会强化制度性伤害。","focus":"读它时要问：技术声称减少偏见时，是否只是把旧权力结构变成更难质疑的自动化流程。","counter":"Normal Technology 会更倾向逐场景治理；加速派和部署乐观派会认为批判低估技术改善制度的能力。","works":["Race After Technology","Viral Justice","New Jim Code"]},"ai-as-normal-technology":{"core":"AI 是重要但普通的通用技术：会改变很多行业，但治理应按具体场景、失败模式和责任链处理，而不是被 AGI 神话支配。","lineage":"Arvind Narayanan 与 Sayash Kapoor 在 AI Snake Oil 之后，于 2024-2025 年政策讨论中提出 AI as Normal Technology 框架，问题是如果把 AI 看作强大但普通的技术，而不是魔法或末日，治理会如何变化。它反对 AGI exceptionalism，也反对产品炒作 (hype)。潜在影响是把注意力转向行业监管、实证性能、部署场景和制度适应，而不是被单一文明叙事统治。","placement":"靠近中间，是因为它既不主张无条件开放，也不接受统一的灾难性暂停；纵轴偏人类/社会结构中心，因为重点是具体机构如何负责。","focus":"阅读时抓住它和 x-risk / e/acc 的差别：它不否认 AI 重要，但拒绝让单一未来叙事统治所有场景。","counter":"Yudkowsky/Bostrom 认为普通技术类比低估超级智能；Andreessen/e/acc 认为场景治理会变成拖慢创新的官僚系统。","works":["AI as Normal Technology","Context-specific AI governance","Technology diffusion and regulation arguments"]},"narayanan-kapoor":{"core":"很多 AI 产品把预测、分类或生成能力包装成通用智能；需要区分有效工具、神药话术 (snake oil) 和夸大的 AGI 叙事。","lineage":"Arvind Narayanan 与 Sayash Kapoor 的 AI Snake Oil 项目，并在 2024 年成书 AI Snake Oil，提出的问题是如何区分真正有效的 AI 与被商业叙事过度包装的预测系统。其语境是招聘、警务、教育和商业分析中大量失败或证据不足的 predictive AI。影响是为媒体、政策制定者和实践者提供区分 generative、predictive 与 decision-making AI 的实用语言。","placement":"中上方是因为它重视实证评估和社会后果；横轴接近中间，因为它不是反技术，而是反过度声明和错误部署。","focus":"重点是问每个系统：任务是什么，基线是什么，真实世界有效性如何，失败时谁负责。","counter":"Scaling thought 会认为短期缺陷不影响长期通用方法；singularity optimism 会认为这种怀疑低估指数式进步。","works":["AI Snake Oil","AI Snake Oil newsletter","Predictive AI critique"]},"gary-marcus-melanie-mitchell":{"core":"深度学习很有用但脆弱；缺少稳健抽象、因果理解、组合泛化和常识时，不应把演示误认为 AGI。","lineage":"Gary Marcus 与 Ernest Davis 2019 年的 Rebooting AI，以及 Melanie Mitchell 同年出版的 Artificial Intelligence: A Guide for Thinking Humans，来自认知科学、符号 AI 和 complex systems 传统。它们提出的问题是：深度学习系统在基准测试 (benchmark) 上表现良好，是否真的拥有抽象、因果和 common sense。影响是在规模化乐观主义 (scaling optimism) 内外保留了一条能力怀疑路线，迫使 AI 讨论面对泛化和理解的边界。","placement":"横轴接近中间，因为它主要是能力判断而非治理运动；纵轴偏人类/社会结构，因为它强调人类可理解的推理和评估。","focus":"读它时看能力边界：模型看起来会说，不等于有可迁移的理解、因果模型或可靠规划。","counter":"Sutton 的 Bitter Lesson 认为手工认知结构终会输给通用计算方法；LeCun 则主张新架构能解决很多缺口。","works":["Rebooting AI","Artificial Intelligence: A Guide for Thinking Humans","Deep learning critique essays"]},"rich-sutton":{"core":"长期来看，依赖搜索、学习和计算的一般方法会胜过人类手工注入的领域知识。","lineage":"Rich Sutton 2019 年的 The Bitter Lesson 总结了强化学习和 AI 研究史中的反复模式：长期看，利用计算的通用方法会超过围绕人类专家知识构建的系统。他提出这一问题，是因为象棋、围棋、语音识别和视觉中的历史都显示手工知识常在规模化方法面前失效。影响是强化了 compute、search、learning 中心主义，并常被用来反驳符号主义和人类直觉中心路线。","placement":"偏右下，是因为它削弱人类直觉和手工知识的权威；但它不是政治加速主义，所以没有放到 e/acc 那么右。","focus":"重点是 epistemic lesson：不要把人类专家知识当作智能系统的最终结构。","counter":"Marcus/Mitchell 认为仅靠 scale 仍缺少抽象和因果；Critical AI 会问这种计算中心主义忽略了谁提供数据和能源。","works":["The Bitter Lesson","Reinforcement learning research tradition"]},"benjamin-bratton":{"core":"应从行星尺度计算、平台堆栈和 synthetic intelligence 理解治理，而不是把 AI 简化成人类工具或市场产品。","lineage":"Benjamin Bratton 2015 年 The Stack 与 2019 年 The Terraforming 来自设计理论、地缘政治、infrastructure studies 和 posthuman governance。它提出的问题是：planetary-scale computation 如何把国家、平台、城市、用户和地球系统重组为一个 layered accidental megastructure。影响是提供了一种非简单人类中心的治理视角：AI 和 computation 的治理不是产品规则，而是行星尺度的系统设计。","placement":"左下方是因为它不是开放加速，而是强系统治理；纵轴偏下，因为它不把当前人类/社会结构当作唯一中心。","focus":"读它时要抓住 Stack 逻辑：AI 是更大行星计算架构的一层，治理问题是系统设计，不只是产品规则。","counter":"e/acc 强调去中心化加速；Catholic/social humanism 则会坚持人类尊严必须限制系统逻辑。","works":["The Stack","The Terraforming","Synthetic intelligence and planetary computation essays"]},"yann-lecun":{"core":"近期毁灭叙事夸大了当前系统的危险；通向更强 AI 需要世界模型、规划和新架构，而不是把 LLM 直接等同 AGI。","lineage":"Yann LeCun 2022 年发布 A Path Towards Autonomous Machine Intelligence，把其长期深度学习、表征学习和开放研究路线推进到世界模型与 JEPA 议程。它在 LLM 与 AI 风险讨论升温时提出问题：机器能否像人和动物一样通过预测世界、规划和内在目标学习，而不只是做文本预测。影响是提供了一种能力乐观但怀疑 LLM 的路线，区别于毁灭叙事和纯规模化叙事。","placement":"偏右是因为它反对过度集中和过早限制；纵轴接近中间，因为它重视能力架构，而不是明确后人类政治。","focus":"重点是区分当前 LLM 局限、未来架构路线和 AI 风险叙事之间的关系。","counter":"Yudkowsky 认为架构细节不改变失控风险；Narayanan/Kapoor 会赞同部分反炒作 (anti-hype)，但更关注产品级滥用。","works":["A Path Towards Autonomous Machine Intelligence","JEPA / world model talks","Open source AI arguments"]},"andrew-ng":{"core":"AI 像电力一样是通用技术，关键是把它接入医疗、教育、工业和服务流程，创造实际生产率和福利。","lineage":"Andrew Ng 在 2017 年前后通过课程、演讲和产业传播推广 AI is the New Electricity 框架，提出的问题是 AI 是否应被理解为类似电力的通用赋能技术，而不是单一 AGI 事件。其语境是应用机器学习、企业采用和研究成果产品化。影响是把落地、工作流重设计和可衡量行业收益变成人工智能战略的实践中心。","placement":"右上方是因为它重视部署和应用收益；纵轴偏人类中心，因为目标是改善人类制度和服务。","focus":"看它如何把 AI 从文明叙事拉回落地问题：数据、流程、产品、组织采用和可衡量收益。","counter":"Safety 视角认为部署速度必须受危险能力约束；Critical AI 认为生产率叙事可能掩盖劳动和权力问题。","works":["AI is the New Electricity","Landing AI / applied AI talks","AI transformation playbooks"]},"sam-altman-openai":{"core":"AGI 可以带来广泛丰裕，但需要安全、治理、收益共享和逐步部署来管理转型。","lineage":"Sam Altman 与 OpenAI 2023 年发布 Planning for AGI and beyond，代表一种 frontier lab 对 AGI 野心、部署、安全和收益共享的综合叙事。它提出的问题是：私人实验室如何在继续构建更通用系统的同时，声称能够管理社会风险并分配收益。影响是定义了 managed-AGI corporate imaginary：受限默认设置、广泛访问、安全承诺和实验室中心化权威同时出现。","placement":"右上偏中，因为它接受继续 build 和部署，同时保留治理、安全和社会收益语言。","focus":"重点是 tension：同一套论述里既有 AGI 丰裕愿景，也有实验室集中控制和安全门槛。","counter":"Critical AI 质疑权力集中；e/acc 质疑闭源和管控；hard safety 质疑部署承诺是否足够。","works":["Planning for AGI and beyond","OpenAI charter","Governance and deployment statements"]},"elon-musk-xai":{"core":"Musk 的 AI 位置是混合型：一方面长期公开警告先进 AI 的生存风险，另一方面又把人类未来想象成火星、Neuralink、人机共生和 xAI 式更强智能的扩展。","lineage":"Elon Musk 在 AI 话语中的位置来自两条线：早期参与 OpenAI 与后来的 AI safety / pause 警告，以及 SpaceX、Neuralink、2023 年后创立 xAI、推出 Grok、开放 Grok-1 权重和架构。它提出的问题不是单纯“暂停还是加速”，而是谁能构建一个被认为更 truth-seeking、较少受既有机构约束、同时又不会毁灭人类的 AI。影响是把 x-risk 警告、后人类式扩展想象、反大厂/反 OpenAI 政治、开源姿态和高强度 build culture 混在同一个公众形象里。","placement":"放在右侧但不贴近 e/acc：右侧来自 xAI build、Grok 开放权重和竞争逻辑；纵轴放到中线下方，因为 Mars / Neuralink / human-AI symbiosis 已经明显超出普通人类中心框架，但仍没有落到 Land 式技术自治。","focus":"读它时要抓住混合性：Musk 不是纯安全暂停派，也不是纯加速主义者，而是风险警告 + 后人类扩展 + 竞争式 build + 部分开放的组合。","counter":"Andreessen 更少强调 x-risk；Yudkowsky 更强调暂停和对齐优先；Altman/OpenAI 更强调实验室治理和收益共享。","works":["Open Release of Grok-1","Pause Giant AI Experiments open letter","xAI / Grok public positioning"]},"peter-thiel":{"core":"Thiel 的核心不是单纯 AI 乐观，而是反停滞：现代社会被风险厌恶、官僚治理和低野心技术困住，需要重新押注深科技、创始人权力和垂直进步。","lineage":"Peter Thiel 的技术政治来自 PayPal、Palantir、Founders Fund、Zero to One 与“we wanted flying cars, instead we got 140 characters”的反停滞叙事。它提出的问题是为什么 1970 年后西方不再产生足够多改变文明形态的技术，以及为什么大学、监管、共识政治和竞争市场会把真正的垂直创新压低为增量改良。放进 AI 语境后，这一路线倾向把 AI 看作打破停滞和重组权力的深科技，而不是普通消费软件。","placement":"右下方是因为它反对停滞和过度风险治理，支持强创始人、深科技和突破性资本配置；纵轴偏下，因为它不太相信民主共识和现有人类制度能定义技术未来，更接近精英化、后自由主义和部分后人类的未来政治。","focus":"读它时要抓住“反停滞”而不是“开源”：Thiel 更关心谁有权推动文明级技术突破，而不一定主张去中心化开放。","counter":"Andreessen 更大众化地讲技术乐观；e/acc 更 memetic 地讲加速；Catholic/social humanism 会质疑这种未来政治是否牺牲共同善和人的尊严。","works":["What Happened to the Future?","Zero to One","Founders Fund / Palantir worldview"]},"ray-kurzweil":{"core":"计算、AI、生命科学和纳米技术的指数进步会推动奇点，人类与机器融合并扩展寿命和认知。","lineage":"Ray Kurzweil 2005 年 The Singularity Is Near 与 2024 年 The Singularity Is Nearer，把 computation、AI、生命科学和纳米技术的指数趋势组织成 singularity 叙事。它提出的问题是：技术进步是否会导致人机融合、寿命延展和智能爆发。其影响是把奇点、丰裕、longevity 和 human-machine integration 推入大众 AI futurism。","placement":"右下方是因为它拥抱强技术进步和人机融合；纵轴偏下，因为当前人类形态不是最终状态。","focus":"读它时要看叙事结构：技术不是单一工具，而是连续加速的进化过程。","counter":"Hype skeptics 认为指数预测常忽略瓶颈；Catholic/social humanism 会质疑增强叙事中的人类观。","works":["The Singularity Is Near","The Singularity Is Nearer","The Age of Spiritual Machines"]},"marc-andreessen":{"core":"技术进步是解决稀缺、疾病和贫困的主要力量；反技术、暂停和过度监管会压制人类繁荣。","lineage":"Marc Andreessen 在 2023 年 6 月 Why AI Will Save the World 和 2023 年 10 月 The Techno-Optimist Manifesto 中，把 Silicon Valley venture-capital build culture 提升为显性的技术政治理论。其问题背景是 ChatGPT 后的监管、AI safety 和伦理争论；他提出的问题是安全、伦理和治理是否正在变成反进步的 veto power。影响是强化了 Silicon Valley anti-pause 立场，把市场、创业和丰裕作为加速 AI 的道德论证。","placement":"右侧是因为它支持 build、部署和抗监管；纵轴略偏人类中心，因为目标仍是人类丰裕和个体能力扩展。","focus":"重点是政治姿态：反对把安全、伦理和治理变成默认的 veto power。","counter":"Critical AI 认为它低估权力和分配；x-risk safety 认为它低估低概率高损失风险。","works":["The Techno-Optimist Manifesto","Why AI Will Save the World","a16z AI essays"]},"effective-accelerationism":{"core":"技术加速本身被视为道德和文明任务；监管、暂停和安全话语常被看作更大的风险。","lineage":"Effective accelerationism 大约在 2022 年的 crypto、AI Twitter 和匿名 build-culture 网络中成形，常与 Beff Jezos 等人物相关，并在 2023 年 AI 监管争论中获得更高可见度。它提出的问题是为什么技术加速应被视为道德善，以及为什么减速、集中控制和 safety gatekeeping 反而可能更危险。影响主要是 memetic：给开放扩散、速度和反监管政治提供了一个可识别的身份标签。","placement":"横轴最右，因为它把加速和开放扩散推到核心；纵轴偏下，因为它弱化人类中心治理，更强调技术演化、市场和去中心化。","focus":"读时要注意它更多是 memetic / political movement，而不是严密学术体系；不同自称 e/acc 的人内部差异很大。","counter":"安全派认为它把风险外部性浪漫化；critical AI 认为它把权力和伤害当成发展成本。","works":["Effective Accelerationism manifestos","Beff Jezos / e/acc discourse","Permissionless innovation arguments"]},"nick-land":{"core":"资本、技术和智能被想象成超过人类主义控制的自主加速过程；人类主体不再是历史的最终中心。","lineage":"Nick Land 的 Meltdown 最早在 1990s 中期 Warwick 的 Cybernetic Culture Research Unit 语境中演出和传播，后来收入 2011 年 Fanged Noumena。它把 Deleuze/Guattari、cybernetics、cyberpunk 和 capitalism 组合成 runaway technocapital 的 theory-fiction。其问题不是人类如何治理技术，而是资本和智能是否已经是逃离 liberal human politics 的非人过程；影响贯穿 accelerationist theory、posthuman political aesthetics 和后来的网络意识形态，既是灵感也是警告。","placement":"最右下是因为它同时拥抱加速和反人类中心；这里的开放不是民主开放，而是技术资本自行推进。","focus":"读它时要区分两层：哲学上的非人加速逻辑，和后来互联网政治中的 Dark Enlightenment 影响。","counter":"Bratton 同样非传统人类中心，但更强调系统设计和治理；humanist safety 与 Catholic social thought 会把 Land 当作需要被限制的反面。","works":["Meltdown","CCRU writings","Fanged Noumena"]}}
  </script>
  <script>
    const referencePoints = JSON.parse(document.querySelector("#referenceData").textContent);
    const referenceProfiles = JSON.parse(document.querySelector("#referenceProfilesData").textContent);
    const referenceDetails = JSON.parse(document.querySelector("#referenceDetailsData").textContent);
    const referenceSources = Object.fromEntries(referencePoints.map((point) => [
      point.id,
      { title: point.sourceTitle, url: point.source }
    ]));
    const categoryInfo = {
      "X-risk safety": { label: "X-risk / 对齐安全", color: "#b42318" },
      "Catholic social humanism": { label: "Catholic social humanism / 人类尊严", color: "#9a3412" },
      "Frontier lab governance": { label: "前沿实验室治理", color: "#0f766e" },
      "Critical AI": { label: "Critical AI / 社会伤害", color: "#7c3aed" },
      "Normal technology": { label: "普通技术 / 场景治理", color: "#475569" },
      "Hype skepticism": { label: "AI 炒作 (hype) 怀疑 / 祛魅", color: "#64748b" },
      "Scaling thought": { label: "Scaling / Bitter Lesson", color: "#0369a1" },
      "Architecture optimism": { label: "架构乐观 / 世界模型", color: "#4f46e5" },
      "Posthuman control": { label: "Posthuman control / 系统治理", color: "#5b21b6" },
      "Pragmatic optimism": { label: "务实 AI 乐观", color: "#15803d" },
      "Techno-libertarianism": { label: "技术自由意志 / 反停滞", color: "#a16207" },
      "Techno-optimism": { label: "技术乐观 / 奇点", color: "#c2410c" },
      "Accelerationism": { label: "加速主义 / 后人类边界", color: "#7f1d1d" }
    };
    const referenceLayer = document.querySelector("#referenceLayer");
    const mapLegend = document.querySelector("#mapLegend");
    const referenceModal = document.querySelector("#referenceModal");
    const referenceDetail = document.querySelector("#referenceDetail");
    let activeReferenceId = "";

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[char]);
    }
    function coordToReferencePercent(value) {
      return Math.max(0, Math.min(100, 7 + ((value + 2) / 4) * 86));
    }
    function quadrantFor(x, y) {
      const horizontal = x < -0.35 ? "控制门槛" : x > 0.35 ? "开放部署" : "中间治理";
      const vertical = y > 0.35 ? "人类/社会结构中心" : y < -0.35 ? "后人类/智能中心" : "中间价值";
      return `${horizontal} / ${vertical}`;
    }
    function renderMapLegend() {
      mapLegend.innerHTML = Object.values(categoryInfo).map((info) => `
        <span><i style="background:${escapeHTML(info.color)}"></i>${escapeHTML(info.label)}</span>
      `).join("");
    }
    function renderReferencePoints() {
      referenceLayer.innerHTML = referencePoints.map((point) => {
        const size = 8 + point.influence * 1.2;
        const info = categoryInfo[point.category] || categoryInfo["Normal technology"];
        const labelSide = point.x > 0.85 ? "label-left" : "label-right";
        const isActive = activeReferenceId === point.id;
        return `
          <button class="reference-point ${labelSide}${isActive ? " active" : ""}" type="button" data-id="${escapeHTML(point.id)}" aria-pressed="${isActive ? "true" : "false"}" style="--left:${coordToReferencePercent(point.x)}%; --bottom:${coordToReferencePercent(point.y)}%; --dx:${point.dx}; --dy:${point.dy}; --size:${size}px; --color:${escapeHTML(info.color)};" title="${escapeHTML(point.name)} · ${escapeHTML(point.cluster)}">
            <span class="reference-label">${escapeHTML(point.label)}</span>
          </button>
        `;
      }).join("");
    }
    function renderReferenceNotes(point, detail, stance) {
      const core = detail?.core || stance;
      const lineage = detail?.lineage || "这个参考点还没有写入完整思想脉络。";
      const placement = detail?.placement || `这个参考点位于${quadrantFor(point.x, point.y)}，因为其公开论证最接近「${point.cluster}」。`;
      const focus = detail?.focus || "把它当作相邻参照，而不是把同一区域里的所有观点都看成完全一致。";
      const counter = detail?.counter || "";
      const works = detail?.works || [];
      const source = referenceSources[point.id];
      const sourceLink = source
        ? `<p>主要参考：<a href="${escapeHTML(source.url)}" target="_blank" rel="noreferrer">${escapeHTML(source.title)}</a></p>`
        : "";
      const worksLine = works.length ? `<p>相关文本：${works.map(escapeHTML).join(" · ")}</p>` : "";
      return `
        <div class="reference-note-grid">
          <div class="reference-note">
            <span>核心命题</span>
            <p>${escapeHTML(core)}</p>
            <p>${escapeHTML(placement)}</p>
            <p>${escapeHTML(focus)}</p>
          </div>
          ${counter ? `<div class="reference-note"><span>对照</span><p>${escapeHTML(counter)}</p></div>` : ""}
          <div class="reference-note">
            <span>思想脉络</span>
            <p>${escapeHTML(lineage)}</p>
            ${sourceLink}
            ${worksLine}
          </div>
        </div>
      `;
    }
    function openReference(point) {
      activeReferenceId = point.id;
      renderReferencePoints();
      const info = categoryInfo[point.category] || categoryInfo["Normal technology"];
      const stance = referenceProfiles[point.id] || point.cluster;
      const detail = referenceDetails[point.id];
      referenceDetail.innerHTML = `
        <div class="reference-detail-head">
          <b id="referenceModalTitle">${escapeHTML(point.name)}</b>
          <span class="reference-detail-badge" style="--color:${escapeHTML(info.color)}">${escapeHTML(info.label)}</span>
        </div>
        ${renderReferenceNotes(point, detail, stance)}
      `;
      referenceModal.hidden = false;
    }
    function closeReference() {
      activeReferenceId = "";
      renderReferencePoints();
      referenceModal.hidden = true;
    }
    referenceLayer.addEventListener("click", (event) => {
      const target = event.target.closest(".reference-point");
      if (!target) return;
      const point = referencePoints.find((item) => item.id === target.dataset.id);
      if (point) openReference(point);
    });
    referenceModal.addEventListener("click", (event) => {
      if (event.target.matches("[data-reference-close]")) closeReference();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !referenceModal.hidden) closeReference();
    });
    renderMapLegend();
    renderReferencePoints();
  </script>
</body>
</html>
