<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 立场易读版</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --soft: #f8fafc;
      --accent: #0f766e;
      --accent-soft: #e2f4f1;
      --blue: #155eef;
      --orange: #b7791f;
      --shadow: 0 12px 28px rgba(20, 31, 52, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(216, 222, 232, 0.92);
      background: rgba(245, 246, 248, 0.94);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 10px 18px;
    }

    .brand {
      display: grid;
      gap: 1px;
    }

    .brand strong {
      font-size: 14px;
      line-height: 1.2;
    }

    .brand span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .btn {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 720;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .lang-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #344054;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 760;
      text-decoration: none;
    }

    .lang-link.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #0b5d55;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 18px 44px;
    }

    .hero,
    .panel,
    .result {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 820px;
      margin: 12px 0 0;
      color: #344054;
      font-size: 15px;
      line-height: 1.7;
    }

    .panel {
      overflow: hidden;
      margin-bottom: 14px;
    }

    .panel-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .panel-head small {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .panel-body {
      padding: 14px 16px 16px;
    }

    .quiz-shell {
      display: block;
    }

    .progress-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-track {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6ebf2;
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .page-card {
      min-height: 360px;
      display: grid;
      align-content: start;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: clamp(18px, 4vw, 34px);
    }

    .page-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .page-prompt {
      max-width: 820px;
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.22;
      letter-spacing: 0;
      white-space: pre-line;
    }

    .single-options {
      display: grid;
      gap: 9px;
    }

    .single-option {
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
      padding: 11px 12px;
      color: #344054;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .single-option input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      clip: rect(0 0 0 0);
      overflow: hidden;
      white-space: nowrap;
    }

    .option-key {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #edf2f7;
      color: #253044;
      font-size: 13px;
      font-weight: 850;
    }

    .option-text {
      font-size: 14px;
      line-height: 1.45;
      font-weight: 680;
    }

    .single-option:has(input:checked) {
      border-color: var(--accent);
      background: #e7f6f3;
      color: #0a5c55;
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.18);
    }

    .single-option:has(input:checked) .option-key {
      background: var(--accent);
      color: #fff;
    }

    .pager-actions,
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .pager-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .submit-status {
      min-height: 18px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .qid {
      display: inline-grid;
      place-items: center;
      min-width: 42px;
      height: 28px;
      border-radius: 5px;
      background: var(--accent-soft);
      color: #0b5d55;
      font-size: 12px;
      font-weight: 850;
    }

    .result {
      padding: 16px;
      margin-top: 16px;
    }

    .result-topline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 11px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.25;
    }

    .map-card {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .map-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .map-head span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-align: right;
    }

    .map-plot {
      position: relative;
      width: min(100%, 680px);
      aspect-ratio: 1 / 1;
      margin: 16px auto 12px;
      border: 1px solid #cfd8e5;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08), transparent 42%, transparent 58%, rgba(21, 94, 239, 0.08)),
        linear-gradient(0deg, rgba(183, 121, 31, 0.08), transparent 42%, transparent 58%, rgba(15, 118, 110, 0.08)),
        #fbfcfe;
    }

    .map-axis {
      position: absolute;
      background: rgba(23, 32, 42, 0.18);
      pointer-events: none;
      z-index: 1;
    }

    .map-axis.horizontal {
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
    }

    .map-axis.vertical {
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
    }

    .map-label {
      position: absolute;
      padding: 5px 7px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.86);
      color: #344054;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.15;
      box-shadow: 0 1px 4px rgba(20, 31, 52, 0.08);
      z-index: 5;
      pointer-events: none;
    }

    .map-label.top {
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .map-label.bottom {
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .map-label.left {
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
    }

    .map-label.right {
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }

    .reference-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .reference-point {
      position: absolute;
      left: var(--left);
      bottom: var(--bottom);
      transform: translate(calc(-50% + var(--dx)), calc(50% + var(--dy)));
      display: block;
      width: var(--size);
      height: var(--size);
      border: 0;
      background: transparent;
      color: var(--color);
      cursor: pointer;
      font: inherit;
      font-size: 10px;
      font-weight: 820;
      line-height: 1.05;
      padding: 0;
      text-align: left;
    }

    .reference-point::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--color);
      box-shadow: 0 2px 8px rgba(20, 31, 52, 0.18);
      transition: box-shadow 120ms ease, transform 120ms ease;
    }

    .reference-point.active {
      z-index: 6;
    }

    .reference-point.active::before,
    .reference-point:hover::before,
    .reference-point:focus-visible::before {
      transform: scale(1.16);
      box-shadow: 0 0 0 3px #fff, 0 0 0 6px var(--color), 0 8px 18px rgba(20, 31, 52, 0.18);
    }

    .reference-label {
      position: absolute;
      top: 50%;
      display: inline-block;
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 3px 5px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 1px 4px rgba(20, 31, 52, 0.08);
      pointer-events: none;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .reference-point.label-right .reference-label {
      left: calc(var(--size) + 5px);
      transform: translateY(-50%);
    }

    .reference-point.label-left .reference-label {
      right: calc(var(--size) + 5px);
      transform: translateY(-50%);
      text-align: right;
    }

    .reference-point.active .reference-label,
    .reference-point:hover .reference-label,
    .reference-point:focus-visible .reference-label {
      border-color: var(--color);
      background: #fff;
      box-shadow: 0 5px 14px rgba(20, 31, 52, 0.14);
    }

    .map-dot {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translate(-50%, 50%);
      display: grid;
      place-items: center;
      min-width: 56px;
      height: 40px;
      padding: 0 10px;
      border: 3px solid #fff;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.25);
      transition: left 220ms ease, bottom 220ms ease;
      z-index: 3;
    }

    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 0 14px 10px;
    }

    .map-legend span {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfe;
      color: #344054;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 780;
      line-height: 1.1;
    }

    .map-legend i {
      display: inline-block;
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 999px;
    }

    .reference-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .reference-modal[hidden] {
      display: none;
    }

    .reference-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(18, 25, 38, 0.42);
    }

    .reference-modal-card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(20, 31, 52, 0.24);
      padding: 14px;
    }

    .reference-modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 18px;
      font-weight: 820;
      cursor: pointer;
    }

    .reference-detail {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 13px 44px 13px 13px;
      min-height: 78px;
    }

    .reference-detail > span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .reference-detail-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .reference-detail-head b {
      font-size: 14px;
      line-height: 1.25;
    }

    .reference-detail-badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      border: 1px solid var(--color);
      border-radius: 999px;
      background: #fff;
      color: var(--color);
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 820;
      line-height: 1.1;
    }

    .reference-detail p {
      margin: 7px 0 0;
      color: #3a4454;
      font-size: 12px;
      line-height: 1.5;
    }

    .profile {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .result > .profile:first-child {
      margin-top: 0;
    }

    .profile-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .code {
      display: grid;
      place-items: center;
      min-width: 68px;
      height: 48px;
      border-radius: 7px;
      background: #17202a;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
    }

    .profile h3 {
      margin: 0;
      font-size: 17px;
    }

    .profile p {
      margin: 0;
      color: #3a4454;
      font-size: 13px;
      line-height: 1.6;
    }

    .profile-body {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .summary {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 10px;
      color: #3a4454;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 760px) {
      .topbar-inner {
        align-items: flex-start;
      }

      .wrap {
        padding: 12px 10px 34px;
      }

      .hero,
      .panel-body,
      .result {
        padding: 12px;
      }

      .result-topline {
        grid-template-columns: 1fr;
      }

      .page-card {
        min-height: 340px;
      }

      .page-prompt {
        font-size: 22px;
      }

      .reference-point {
        font-size: 9px;
      }

      .reference-label {
        max-width: 86px;
        padding: 2px 4px;
      }

      .reference-point.label-right .reference-label {
        left: calc(var(--size) + 3px);
      }

      .reference-point.label-left .reference-label {
        right: calc(var(--size) + 3px);
      }

      .pager-actions {
        align-items: stretch;
      }

      .pager-actions .btn {
        flex: 1 1 120px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <strong>AI 立场易读版</strong>
        <span>12 个短问题</span>
      </div>
      <div class="topbar-actions">
        <a class="lang-link active" href="ai-ideology-quiz-readable.html">中文</a>
        <a class="lang-link" href="ai-ideology-quiz-readable-en.html">EN</a>
        <button class="btn" id="resetBtn" type="button">重置</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <form id="quizForm" class="quiz-shell">
      <section class="panel" id="quizPager">
        <div class="panel-head">
          <small id="pageCount">第 1 / 12 题</small>
        </div>
        <div class="panel-body">
          <div class="progress-row" aria-hidden="true">
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0/12</div>
          </div>

          <article class="page-card">
            <div class="page-meta">
              <span class="qid" id="pageTag">开始</span>
              <span id="pageInstruction">选择最接近你的位置</span>
            </div>
            <h2 class="page-prompt" id="pagePrompt"></h2>
            <div class="single-options" id="pageOptions"></div>
          </article>

          <div class="pager-actions">
            <button class="btn" id="prevBtn" type="button">上一题</button>
            <span class="pager-note" id="pagerNote">请选择一个选项继续</span>
            <button class="btn primary" id="nextBtn" type="button">下一题</button>
          </div>
        </div>
      </section>
    </form>

    <section class="result" id="resultPanel" aria-live="polite" hidden>
      <div class="profile">
        <div class="profile-head">
          <div class="code" id="profileCode">----</div>
          <div>
            <h3 id="profileName">等待生成画像</h3>
            <p id="profileLineage">答完核心题后生成类型。</p>
          </div>
        </div>
        <div class="profile-body">
          <p id="profileRoast">至少完成 9 道核心题，结果会更稳。</p>
          <p><b>代表文本：</b><span id="profileTexts">--</span></p>
          <p><b>社交识别：</b><span id="profileTell">--</span></p>
        </div>
      </div>

      <div class="result-topline">
        <div class="metric">
          <span>能力判断</span>
          <strong id="abilityNarrative">--</strong>
        </div>
        <div class="metric">
          <span>风险判断</span>
          <strong id="dimensionR">--</strong>
        </div>
        <div class="metric">
          <span>治理位置</span>
          <strong id="dimensionC">--</strong>
        </div>
        <div class="metric">
          <span>价值位置</span>
          <strong id="dimensionH">--</strong>
        </div>
      </div>

      <div class="map-card">
        <div class="map-head">
          <h2>二维立场图</h2>
          <span id="mapQuadrant">答完后显示位置</span>
        </div>
        <div class="map-plot" aria-label="AI 立场二维图">
          <div class="map-axis horizontal"></div>
          <div class="map-axis vertical"></div>
          <span class="map-label top">人类中心</span>
          <span class="map-label bottom">后人类/智能中心</span>
          <span class="map-label left">控制门槛</span>
          <span class="map-label right">开放部署</span>
          <div class="reference-layer" id="referenceLayer"></div>
          <div class="map-dot" id="mapDot"><span id="mapDotCode">----</span></div>
        </div>
        <div class="map-legend" id="mapLegend" aria-label="思想谱系图例"></div>
      </div>

      <div class="summary" id="summaryBox">答完后这里会生成结构化摘要。</div>
      <div class="result-actions">
        <button class="btn" id="editLastBtn" type="button">修改上一题</button>

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function selected(name) {
      return answers[name] || "";
    }

    function selectedValues(name) {
      const value = answers[name];
      if (Array.isArray(value)) return value;
      return value ? [value] : [];
    }

    function hasAnswer(page) {
      const value = answers[page.id];
      return Array.isArray(value) ? value.length > 0 : Boolean(value);
    }

    function centered(value) {
      return (Number(value) - 3) / 2;
    }

    function formatScore(value) {
      if (!Number.isFinite(value)) return "--";
      const rounded = Number(value.toFixed(2));
      return rounded > 0 ? `+${rounded}` : `${rounded}`;
    }

    function clampScore(value) {
      return Math.max(-2, Math.min(2, value));
    }

    function diagnosticValue(kind) {
      const question = questions.find((item) => item.diagnosis === kind);
      const value = question ? selected(question.id) : "";
      return value ? clampScore(2 * centered(value)) : NaN;
    }

    function directedDimensionScore(dimension) {
      const items = questions.filter((item) => item.dimension === dimension && item.direction);
      const values = items
        .map((item) => {
          const value = selected(item.id);
          return value ? centered(value) * item.direction : NaN;
        })
        .filter(Number.isFinite);

      return values.length === items.length
        ? 2 * (values.reduce((sum, value) => sum + value, 0) / values.length)
        : NaN;
    }

    function riskSpectrumLabel(result) {
      const entries = [
        { key: "catastrophic", value: result.rCatastrophic, label: "文明级风险" },
        { key: "social", value: result.rSocialHarm, label: "现实社会伤害" },
        { key: "normal", value: result.rNormalTech, label: "普通技术/过度叙事" },
        { key: "opportunity", value: result.rOpportunityCost, label: "机会成本" }
      ].sort((a, b) => b.value - a.value);
      const [top, second] = entries;
      if (top.value < 0.4) return `${top.label} / ${second.label}（弱信号）`;
      if (top.value - second.value <= 0.35) return `${top.label} / ${second.label}并重`;
      return `主导：${top.label}；次要：${second.label}`;
    }

    function responseSpectrumLabel(value) {
      if (!Number.isFinite(value)) return "--";
      if (value <= -1.2) return "强控制";
      if (value <= -0.4) return "控制倾向";
      if (value < 0.4) {
        if (value <= -0.15) return "中间，略偏控制";
        if (value >= 0.15) return "中间，略偏开放";
        return "中间";
      }
      if (value < 1.2) return "开放倾向";
      return "强开放";
    }

    function valueSpectrumLabel(value) {
      if (!Number.isFinite(value)) return "--";
      if (value >= 1.2) return "强人类中心";
      if (value >= 0.4) return "人类中心";
      if (value > -0.4) {
        if (value >= 0.15) return "中间，略偏人类中心";
        if (value <= -0.15) return "中间，略偏智能中心";
        return "中间";
      }
      if (value > -1.2) return "智能中心";
      return "强后人类/智能中心";
    }

    function itemCenteredScore(id) {
      const value = selected(id);
      return value ? centered(value) : NaN;
    }

    function abilityNarrativeScore() {
      const weights = [
        ["R03", 0.45],
        ["R02", 0.10],
        ["R01", -0.35],
        ["R04", -0.25],
        ["H03", -0.15],
        ["C01", -0.10]
      ];

      let numerator = 0;
      let denominator = 0;
      for (const [id, weight] of weights) {
        const value = itemCenteredScore(id);
        if (!Number.isFinite(value)) continue;
        numerator += value * weight;
        denominator += Math.abs(weight);
      }

      return denominator > 0 ? numerator / denominator : NaN;
    }

    function abilityNarrativeLabel(value) {
      if (!Number.isFinite(value)) return "--";
      if (value >= 0.45) return "明显 bubble 怀疑";
      if (value >= 0.15) return "偏 hype 怀疑";
      if (value > -0.15) return "证据混合";
      if (value > -0.45) return "偏相信变革性 AI";
      return "强变革性 AI 信念";
    }

    function answeredPages() {
      return pages.filter(hasAnswer).length;
    }

    function currentPageAnswered() {
      const page = pages[currentIndex];
      return page ? hasAnswer(page) : true;
    }

    function updatePagerControls() {
      const done = answeredPages();
      const page = pages[currentIndex];
      const isMulti = Boolean(page && page.multiple);
      progressFill.style.width = `${Math.round((done / pages.length) * 100)}%`;
      progressText.textContent = `${done}/${pages.length}`;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = !currentPageAnswered();
      nextBtn.textContent = currentIndex === pages.length - 1 ? "查看结果" : "下一题";
      pagerNote.textContent = currentPageAnswered()
        ? "已选择，可以继续"
        : isMulti ? "请选择至少一个选项继续" : "请选择一个选项继续";
    }

    function scrollToElement(element) {
      const topbarHeight = document.querySelector(".topbar")?.offsetHeight || 0;
      const top = element.getBoundingClientRect().top + window.scrollY - topbarHeight - 12;
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    function renderPage(shouldScroll = false) {
      if (currentIndex >= pages.length) {
        if (heroSection) heroSection.hidden = true;
        quizPager.hidden = true;
        resultPanel.hidden = false;
        update();
        if (shouldScroll) scrollToElement(resultPanel);
        return;
      }

      const page = pages[currentIndex];
      if (heroSection) heroSection.hidden = false;
      quizPager.hidden = false;
      resultPanel.hidden = true;
      pageCount.textContent = `第 ${currentIndex + 1} / ${pages.length} 题`;
      pageTag.textContent = page.multiple ? `${page.tag} · 多选` : page.tag;
      pageInstruction.textContent = page.instruction;
      pagePrompt.textContent = page.prompt;
      const inputType = page.multiple ? "checkbox" : "radio";
      pageOptions.innerHTML = page.options.map(([value, key, label]) => `
        <label class="single-option">
          <input type="${inputType}" name="${escapeHTML(page.id)}" value="${escapeHTML(value)}" ${selectedValues(page.id).includes(value) ? "checked" : ""}>
          <span class="option-key">${escapeHTML(key)}</span>
          <span class="option-text">${escapeHTML(label)}</span>
        </label>
      `).join("");
      updatePagerControls();
      if (shouldScroll) scrollToElement(quizPager);
    }

    function calculate() {
      let answered = 0;

      for (const q of questions) {
        const value = selected(q.id);
        if (!value) continue;
        answered += 1;
      }

      const complete = answered === questions.length;
      const rCatastrophic = complete ? diagnosticValue("catastrophic") : NaN;
      const rSocialHarm = complete ? diagnosticValue("social") : NaN;
      const rNormalTech = complete ? diagnosticValue("normal") : NaN;
      const rOpportunityCost = complete ? diagnosticValue("opportunity") : NaN;
      const rProjection = complete ? rCatastrophic - rOpportunityCost : NaN;
      const c = complete ? directedDimensionScore("c") : NaN;
      const h = complete ? directedDimensionScore("h") : NaN;
      const x = complete ? clampScore((0.65 * c) - (0.35 * rProjection)) : NaN;
      const y = complete ? h : NaN;

      return {
        x,
        y,
        rProjection,
        rCatastrophic,
        rSocialHarm,
        rNormalTech,
        rOpportunityCost,
        c,
        h,
        answered
      };
    }

    function baseProfileFor(x, y) {
      if (!Number.isFinite(x) || !Number.isFinite(y)) return "";
      if (x >= 1.5 && y <= -1.5) return "POST";
      if (x >= 1.25 && y <= -0.75) return "VROM";
      if (x <= -1.25 && y >= 0) return "STOP";
      if (x >= 1.25 && y >= -0.75 && y <= 0.75) return "SING";
      if (x >= 0.15 && y <= 0.15) return "GPUC";
      if (x >= 0.55 && y >= 0.25) return "BOOM";
      if (x >= -1.5 && x <= -0.25 && y >= 0.75) return "SAFE";
      if (x >= -0.5 && x <= 0.5 && y >= 1.25) return "AUDT";
      return "";
    }

    function addEvidence(scores, code, weight) {
      if (!code || !(code in scores)) return;
      scores[code] += weight;
    }

    function addCoreProfileEvidence(scores, result) {
      if (!Number.isFinite(result.x) || !Number.isFinite(result.y)) return;
      const cat = Math.max(0, result.rCatastrophic);
      const social = Math.max(0, result.rSocialHarm);
      const normal = Math.max(0, result.rNormalTech);
      const opportunity = Math.max(0, result.rOpportunityCost);
      const control = Math.max(0, -result.c / 2);
      const open = Math.max(0, result.c / 2);
      const human = Math.max(0, result.h / 2);
      const posthuman = Math.max(0, -result.h / 2);
      const middleResponse = 1 - Math.min(1, Math.abs(result.c / 2));

      addEvidence(scores, "STOP", (3.0 * cat) + (2.0 * control) + (0.6 * human));
      addEvidence(scores, "SAFE", (1.5 * cat) + (1.7 * control) + (1.4 * human));
      addEvidence(scores, "AUDT", (3.0 * social) + (0.8 * control) + (1.6 * human));
      addEvidence(scores, "NORM", (3.0 * normal) + (0.6 * human) + (0.8 * middleResponse));
      addEvidence(scores, "GPUC", (0.8 * normal) + (0.8 * open) + (1.4 * posthuman));
      addEvidence(scores, "BOOM", (2.4 * opportunity) + (1.1 * open) + (1.0 * human));
      addEvidence(scores, "SING", (1.5 * opportunity) + (1.1 * open) + (1.2 * posthuman));
      addEvidence(scores, "VROM", (1.6 * opportunity) + (2.2 * open) + (0.7 * posthuman));
      addEvidence(scores, "POST", (0.9 * opportunity) + (1.4 * open) + (2.5 * posthuman));
    }

    function profileEvidence(result) {
      const scores = Object.fromEntries(Object.keys(profiles).map((code) => [code, 0]));
      addCoreProfileEvidence(scores, result);

      selectedValues("closestStatement").forEach((statement) => {
        const index = statements.indexOf(statement);
        addEvidence(scores, statementProfiles[index], 3);
      });

      scenarios.forEach((scenario) => {
        const choice = selected(scenario.id);
        const index = scenario.options.indexOf(choice);
        addEvidence(scores, scenarioProfiles[scenario.id]?.[index], 1);
      });

      return scores;
    }

    function nearestProfileFor(x, y, candidates = Object.keys(profileAnchors)) {
      if (!Number.isFinite(x) || !Number.isFinite(y)) return "NORM";
      return candidates.reduce((best, code) => {
        const anchor = profileAnchors[code];
        const distance = ((x - anchor.x) ** 2) + ((y - anchor.y) ** 2);
        return distance < best.distance ? { code, distance } : best;
      }, { code: candidates[0], distance: Infinity }).code;
    }

    function evidenceWinner(scores, x, y) {
      const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const [topCode, topScore] = ranked[0];
      if (topScore < 2) return "";
      const tied = ranked.filter(([, score]) => score === topScore).map(([code]) => code);
      if (tied.length > 1) return nearestProfileFor(x, y, tied);
      return topCode;
    }

    function profileFor(result) {
      if (!Number.isFinite(result.x) || !Number.isFinite(result.y)) return "NORM";
      const winner = evidenceWinner(profileEvidence(result), result.x, result.y);
      if (winner) return winner;
      return nearestProfileFor(result.x, result.y);
    }

    function clampPercent(value) {
      return Math.max(0, Math.min(100, value));
    }

    function coordToPercent(value) {
      return clampPercent(((value + 2) / 4) * 100);
    }

    function coordToReferencePercent(value) {
      return clampPercent(7 + ((value + 2) / 4) * 86);
    }

    function categoryForPoint(point) {
      return referenceCategoryById[point.id] || "Normal technology";
    }

    function renderMapLegend() {
      mapLegend.innerHTML = Object.entries(categoryInfo).map(([, info]) => `
        <span><i style="background:${info.color}"></i>${escapeHTML(info.label)}</span>
      `).join("");
    }

    function renderReferencePoints() {
      referenceLayer.innerHTML = referencePoints.map((point) => {
        const size = 8 + point.influence * 1.2;
        const category = categoryForPoint(point);
        const info = categoryInfo[category];
        const isActive = activeReferenceId === point.id;
        const labelSide = point.x > 0.85 ? "label-left" : "label-right";
        return `
          <button class="reference-point ${labelSide}${isActive ? " active" : ""}" type="button" data-id="${escapeHTML(point.id)}" aria-pressed="${isActive ? "true" : "false"}" style="--left:${coordToReferencePercent(point.x)}%; --bottom:${coordToReferencePercent(point.y)}%; --dx:${point.dx}; --dy:${point.dy}; --size:${size}px; --color:${info.color};" title="${escapeHTML(point.name)} · ${escapeHTML(point.cluster)}">
            <span class="reference-label">${escapeHTML(point.label)}</span>
          </button>
        `;
      }).join("");
    }

    function quadrantFor(x, y) {
      if (!Number.isFinite(x) || !Number.isFinite(y)) return "答完后显示位置";
      const horizontal = x < -0.35 ? "控制门槛" : x > 0.35 ? "开放部署" : "响应中间";
      const vertical = y > 0.35 ? "人类中心" : y < -0.35 ? "后人类/智能中心" : "价值中间";
      return `${horizontal} / ${vertical}`;
    }

    function closeReferenceModal() {
      referenceModal.hidden = true;
    }

    function renderReferenceDetail(point) {
      if (!point) {
        referenceDetail.innerHTML = "";
        closeReferenceModal();
        return;
      }

      const category = categoryForPoint(point);
      const info = categoryInfo[category];
      const stance = referenceProfiles[point.id] || point.cluster;
      referenceDetail.innerHTML = `
        <div class="reference-detail-head">
          <b id="referenceModalTitle">${escapeHTML(point.name)}</b>
          <span class="reference-detail-badge" style="--color:${info.color}">${escapeHTML(info.label)}</span>
        </div>
        <p>${escapeHTML(stance)}</p>
        <p><b>谱系：</b>${escapeHTML(point.cluster)} · <b>图谱位置：</b>${escapeHTML(quadrantFor(point.x, point.y))} · <b>影响力：</b>${escapeHTML(point.influence)}/5</p>
      `;
      referenceModal.hidden = false;
    }

    function updateMap(result, complete, code) {
      mapDot.hidden = !complete;
      mapDotCode.textContent = complete ? code : "----";
      mapQuadrant.textContent = complete ? quadrantFor(result.x, result.y) : "答完后显示位置";
      if (!complete) return;
      mapDot.style.left = `${coordToPercent(result.x)}%`;
      mapDot.style.bottom = `${coordToPercent(result.y)}%`;
    }

    function canSubmitResults() {
      const host = window.location.hostname;
      if (!host || host === "localhost" || host === "127.0.0.1") return false;
      if (host === "cestunyu.github.io" || host.endsWith(".github.io")) return false;
      return true;
    }

    function fixedScore(value) {
      return Number.isFinite(value) ? Number(value.toFixed(4)) : "";
    }

    function buildResultPayload(result, code, profile, riskLabel, responseLabel, valueLabel, abilityLabel) {
      const abilityScore = abilityNarrativeScore();
      return {
        quiz_id: "ai-ideology-quiz",
        quiz_version: "2026-05-24",
        locale: "zh-CN",
        completed_at: new Date().toISOString(),
        profile_code: code,
        profile_name: profile[0],
        profile_lineage: profile[1],
        scores: {
          x: fixedScore(result.x),
          y: fixedScore(result.y),
          r_projection: fixedScore(result.rProjection),
          r_catastrophic: fixedScore(result.rCatastrophic),
          r_social_harm: fixedScore(result.rSocialHarm),
          r_normal_tech: fixedScore(result.rNormalTech),
          r_opportunity_cost: fixedScore(result.rOpportunityCost),
          c: fixedScore(result.c),
          h: fixedScore(result.h),
          ability: fixedScore(abilityScore)
        },
        labels: {
          ability: abilityLabel,
          risk: riskLabel,
          governance: responseLabel,
          value: valueLabel,
          quadrant: quadrantFor(result.x, result.y)
        },
        answers: Object.fromEntries(questions.map((question) => [question.id, selected(question.id)])),
        scenarios: Object.fromEntries(scenarios.map((scenario) => [scenario.id, selected(scenario.id)])),
        warmup_reaction: selected("warmupReaction"),
        closest_statement: selectedValues("closestStatement"),
        summary: summaryBox.textContent
      };
    }

    function resultFingerprint(payload) {
      return JSON.stringify({
        locale: payload.locale,
        profile_code: payload.profile_code,
        scores: payload.scores,
        answers: payload.answers,
        scenarios: payload.scenarios,
        closest_statement: payload.closest_statement,
        warmup_reaction: payload.warmup_reaction
      });
    }

    async function submitResultPayload(payload) {
      submitStatus.textContent = "正在记录结果...";
      try {
        const response = await fetch("/api/submit-result", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        submitStatus.textContent = "结果已记录。";
      } catch (error) {
        submitStatus.textContent = "结果记录失败，不影响查看结果。";
      }
    }

    function maybeSubmitResult(result, complete, code, profile, riskLabel, responseLabel, valueLabel, abilityLabel) {
      if (!submitStatus) return;
      if (!complete) {
        submitStatus.textContent = "";
        return;
      }
      if (!canSubmitResults()) return;

      const payload = buildResultPayload(result, code, profile, riskLabel, responseLabel, valueLabel, abilityLabel);
      const fingerprint = resultFingerprint(payload);
      if (fingerprint === lastSubmittedFingerprint) return;
      lastSubmittedFingerprint = fingerprint;
      submitResultPayload(payload);
    }

    function update() {
      const result = calculate();
      const code = profileFor(result);
      const profile = profiles[code];
      const complete = Number.isFinite(result.x) && Number.isFinite(result.y);
      const riskLabel = complete ? riskSpectrumLabel(result) : "--";
      const responseLabel = complete ? responseSpectrumLabel(result.c) : "--";
      const valueLabel = complete ? valueSpectrumLabel(result.h) : "--";
      const abilityLabel = complete ? abilityNarrativeLabel(abilityNarrativeScore()) : "--";

      abilityNarrative.textContent = abilityLabel;
      dimensionR.textContent = riskLabel;
      dimensionC.textContent = responseLabel;
      dimensionH.textContent = valueLabel;
      updateMap(result, complete, code);
      profileCode.textContent = complete ? code : "----";
      profileName.textContent = complete ? `${profile[0]} ${code}` : "等待生成画像";
      profileLineage.textContent = complete ? profile[1] : "答完核心题后生成类型。";
      profileRoast.textContent = complete ? profile[2] : "至少完成 9 道核心题，结果会更稳。";
      profileTexts.textContent = complete ? profile[3] : "--";
      profileTell.textContent = complete ? profile[4] : "--";

      const warmup = selected("warmupReaction");
      const scenarioSummary = scenarios.map((s) => selected(s.id) ? `${s.id}: ${selected(s.id)}` : "").filter(Boolean).join(" | ");
      const statement = selectedValues("closestStatement").join(" | ");

      summaryBox.textContent = complete
        ? [
            "AI 立场易读版结果",
            warmup ? `开场直觉：${warmup}` : "",
            statement ? `总体立场：${statement}` : "",
            `人物画像：${code} ${profile[0]}`,
            `光谱位置：能力判断=${abilityLabel}；风险判断=${riskLabel}；治理位置=${responseLabel}；价值位置=${valueLabel}`,
            `二维位置：${quadrantFor(result.x, result.y)}`,
            scenarioSummary ? `情境选择：${scenarioSummary}` : ""
          ].filter(Boolean).join("\n")
        : "答完 9 道核心题后，这里会生成结构化摘要。";
      maybeSubmitResult(result, complete && currentIndex >= pages.length, code, profile, riskLabel, responseLabel, valueLabel, abilityLabel);
    }

    function resetQuiz() {
      answers = {};
      currentIndex = 0;
      activeReferenceId = "";
      lastSubmittedFingerprint = "";
      if (submitStatus) submitStatus.textContent = "";
      update();
      renderReferencePoints();
      renderReferenceDetail();
      renderPage();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    form.addEventListener("change", (event) => {
      if (!event.target.matches("input[type='radio'], input[type='checkbox']")) return;
      const page = pages.find((item) => item.id === event.target.name);
      if (page && page.multiple) {
        let values = Array.from(pageOptions.querySelectorAll(`input[name="${event.target.name}"]:checked`)).map((input) => input.value);
        if (page.exclusiveValue) {
          if (event.target.value === page.exclusiveValue && event.target.checked) {
            values = [page.exclusiveValue];
          } else {
            values = values.filter((value) => value !== page.exclusiveValue);
          }
          pageOptions.querySelectorAll(`input[name="${event.target.name}"]`).forEach((input) => {
            input.checked = values.includes(input.value);
          });
        }
        answers[event.target.name] = values;
      } else {
        answers[event.target.name] = event.target.value;
      }
      update();
      updatePagerControls();
    });

    prevBtn.addEventListener("click", () => {
      if (currentIndex === 0) return;
      currentIndex -= 1;
      renderPage(true);
    });

    nextBtn.addEventListener("click", () => {
      if (!currentPageAnswered()) return;
      currentIndex += 1;
      renderPage(true);
    });

    resetBtn.addEventListener("click", resetQuiz);
    restartBtn.addEventListener("click", resetQuiz);
    editLastBtn.addEventListener("click", () => {
      currentIndex = pages.length - 1;
      renderPage(true);
    });

    referenceLayer.addEventListener("click", (event) => {
      const target = event.target.closest(".reference-point");
      if (!target) return;
      const point = referencePoints.find((item) => item.id === target.dataset.id);
      if (!point) return;
      activeReferenceId = point.id;
      renderReferencePoints();
      renderReferenceDetail(point);
    });

    referenceModal.addEventListener("click", (event) => {
      if (!event.target.matches("[data-reference-close]")) return;
      closeReferenceModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape" || referenceModal.hidden) return;
      closeReferenceModal();
    });

    update();
    renderMapLegend();
    renderReferencePoints();
    renderReferenceDetail();
    renderPage();
  </script>
</body>
</html>
