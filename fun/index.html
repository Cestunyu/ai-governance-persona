<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Governance Persona Fun Quiz</title>
  <meta name="description" content="A lightweight AI governance persona pilot quiz in English and Chinese.">
  <meta http-equiv="refresh" content="0; url=/fun/en/">
  <link rel="canonical" href="/fun/en/">
  <script>
    const language = navigator.language || "";
    window.location.replace(language.toLowerCase().startsWith("zh") ? "/fun/cn/" : "/fun/en/");
  </script>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      color: #17202a;
    }
    body {
      margin: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(520px, 100%);
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
      padding: 22px;
      box-shadow: 0 12px 28px rgba(20, 31, 52, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
    }
    p {
      margin: 0 0 16px;
      color: #475467;
      line-height: 1.55;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    a {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      border: 1px solid #0f766e;
      border-radius: 6px;
      background: #0f766e;
      color: #fff;
      padding: 8px 12px;
      font-weight: 760;
      text-decoration: none;
    }
    a.secondary {
      border-color: #d8dee8;
      background: #fff;
      color: #344054;
    }
  </style>
</head>
<body>
  <main>
    <h1>AI Governance Persona Fun Quiz</h1>
    <p>A quick pilot map of AI governance intuitions. It is not a validated personality test.</p>
    <div class="links">
      <a href="/fun/en/">English</a>
      <a class="secondary" href="/fun/cn/">中文</a>
    </div>
  </main>
</body>
</html>
