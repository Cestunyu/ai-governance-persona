<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
  <title>AI 人格测试 · 轻松版</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --soft: #f8fafc;
      --accent: #0f766e;
      --accent-soft: #e2f4f1;
      --blue: #155eef;
      --orange: #b7791f;
      --shadow: 0 12px 28px rgba(20, 31, 52, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    button, input { font: inherit; }
    button:disabled { cursor: not-allowed; opacity: 0.48; }
    [hidden] { display: none !important; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(216, 222, 232, 0.92);
      background: rgba(245, 246, 248, 0.94);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 10px 18px;
    }

    .brand {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand strong {
      font-size: 14px;
      line-height: 1.2;
    }

    .brand-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-progress {
      justify-self: end;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .brand span {
      display: none;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .btn, .lang-link {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 720;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn.compact {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .lang-link.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #0b5d55;
    }

    .topbar-actions {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
      align-items: center;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 18px 44px;
    }

    .result {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .panel {
      overflow: hidden;
      margin-bottom: 14px;
      border: 0;
      background: transparent;
      box-shadow: none;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 0 8px;
    }

    .panel-head small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      min-height: 28px;
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 820;
      line-height: 1;
    }

    .progress-row {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-track {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6ebf2;
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .page-card {
      min-height: 360px;
      display: grid;
      align-content: start;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: clamp(18px, 4vw, 34px);
      box-shadow: var(--shadow);
    }

    .page-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .qid {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #0b5d55;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 850;
      line-height: 1;
    }

    .page-prompt {
      max-width: 820px;
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.22;
      letter-spacing: 0;
    }

    .single-options {
      display: grid;
      gap: 9px;
    }

    .single-option {
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
      padding: 11px 12px;
      color: #344054;
      cursor: pointer;
    }

    .single-option input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      clip: rect(0 0 0 0);
      overflow: hidden;
      white-space: nowrap;
    }

    .option-key {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #edf2f7;
      color: #253044;
      font-size: 13px;
      font-weight: 850;
    }

    .option-text {
      min-width: 0;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 680;
    }

    .single-option:has(input:checked) {
      border-color: var(--accent);
      background: #e7f6f3;
      color: #0a5c55;
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.18);
    }

    .pager-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 2px;
    }

    .submit-status {
      min-height: 18px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .result {
      display: grid;
      gap: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .profile {
      display: grid;
      grid-template-columns: clamp(168px, 22vw, 212px) minmax(0, 1fr);
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .profile-visual {
      display: grid;
      gap: 12px;
      align-content: start;
      justify-items: center;
      border-right: 1px solid var(--line);
      background: #fbfcfe;
      padding: 14px;
      text-align: center;
    }

    .profile-avatar {
      display: block;
      width: min(100%, 220px);
      aspect-ratio: 1;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 8px;
      object-fit: cover;
      background: #f1f5f9;
    }

    .profile-title {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .code {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .profile-body { display: grid; gap: 12px; align-content: start; padding: 14px; }
    .profile-lead { margin: 0; color: #17202a; font-size: 20px; font-weight: 760; line-height: 1.42; }
    .profile-sublead { margin: 0; color: #475467; font-size: 14px; line-height: 1.62; }

    .share-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .share-actions .btn.primary {
      flex: 1 1 150px;
      min-height: 38px;
      font-weight: 850;
    }

    .share-card {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .share-card p {
      margin: 0;
      color: #475467;
      font-size: 13px;
      line-height: 1.5;
    }

    .profile-facts, .result-topline {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-topline { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .profile-fact, .metric, .map-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 12px;
    }

    .profile-fact > span, .metric > span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
    }

    .profile-fact > p, .metric > strong {
      margin: 0;
      color: #253044;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 660;
    }

    .metric > strong { display: block; min-height: 38px; font-size: 14px; }

    .map-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .map-head h2 { margin: 0; font-size: 18px; line-height: 1.2; }
    .map-head span { color: var(--muted); font-size: 12px; font-weight: 760; }

    .map-plot {
      position: relative;
      min-height: 340px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08), transparent 42%, transparent 58%, rgba(21, 94, 239, 0.08)),
        linear-gradient(180deg, rgba(183, 121, 31, 0.10), transparent 45%, transparent 55%, rgba(17, 24, 39, 0.06)),
        #fff;
    }

    .map-axis { position: absolute; background: rgba(102, 112, 133, 0.35); }
    .map-axis.horizontal { left: 8%; right: 8%; top: 50%; height: 1px; }
    .map-axis.vertical { top: 8%; bottom: 8%; left: 50%; width: 1px; }

    .map-label {
      position: absolute;
      color: rgba(52, 64, 84, 0.76);
      font-size: 11px;
      font-weight: 760;
      line-height: 1;
      pointer-events: none;
    }

    .map-label.top { top: 10px; left: 50%; transform: translateX(-50%); }
    .map-label.bottom { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .map-label.left { top: 50%; left: 10px; transform: translateY(-50%); }
    .map-label.right { top: 50%; right: 10px; transform: translateY(-50%); }

    .reference-dot {
      position: absolute;
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(17, 24, 39, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: #253044;
      font-size: 9px;
      font-weight: 900;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 12px rgba(20, 31, 52, 0.08);
    }

    .map-dot {
      position: absolute;
      display: inline-flex;
      width: 48px;
      height: 48px;
      align-items: center;
      justify-content: center;
      border: 3px solid #fff;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      transform: translate(-50%, -50%);
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.35);
      transition: left 200ms ease, top 200ms ease;
    }

    .spectrum { margin-top: 10px; }
    .spectrum-scale {
      position: relative;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #155eef, #eef2f7 50%, #0f766e);
    }

    .spectrum-marker {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      border: 3px solid #fff;
      border-radius: 999px;
      background: #111827;
      transform: translate(-50%, -50%);
      box-shadow: 0 3px 8px rgba(17, 24, 39, 0.22);
    }

    .spectrum-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 720;
      line-height: 1.25;
    }

    .result-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    @media (max-width: 760px) {
      .topbar-inner { padding: 9px 12px; }
      .wrap { padding: 14px 12px 34px; }
      .brand { grid-template-columns: minmax(0, 1fr); gap: 2px; }
      .brand-progress { justify-self: start; }
      .topbar-actions .lang-link { display: none; }
      .page-card { min-height: 430px; }
      .profile, .profile-facts, .result-topline { grid-template-columns: 1fr; }
      .profile-visual { border-right: 0; border-bottom: 1px solid var(--line); }
      .map-plot { min-height: 300px; }
      .result-actions { justify-content: stretch; }
      .result-actions .btn { flex: 1 1 auto; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <strong class="brand-title">AI 人格测试 · 轻松版</strong>
        <span>18 道短题，轻松生成你的 AI 人格画像。</span>
        <strong class="brand-progress" id="brandProgress">0/18</strong>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="resetBtn" type="button">重置</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <form id="quizForm" class="quiz-shell">
      <section class="panel" id="quizPager">
        <div class="panel-head">
          <button class="btn compact" id="prevTopBtn" type="button">上一题</button>
          <small id="pageCount">第 1 题</small>
        </div>
        <div class="panel-body">
          <div class="progress-row" aria-hidden="true">
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">0/18</div>
          </div>
          <article class="page-card">
            <div class="page-meta">
              <span class="qid" id="pageTag">FUN01</span>
              <span id="pageInstruction">选择最接近你的一句</span>
            </div>
            <h2 class="page-prompt" id="pagePrompt"></h2>
            <div class="single-options" id="pageOptions"></div>
            <div class="pager-actions">
              <button class="btn" id="prevBtn" type="button">上一题</button>
              <button class="btn primary" id="nextBtn" type="button">下一题</button>
            </div>
          </article>
        </div>
      </section>
    </form>

    <section class="result" id="resultPanel" aria-live="polite" hidden>
      <div class="profile">
        <div class="profile-visual">
          <img class="profile-avatar" id="profileAvatar" alt="AI 人格测试头像">
          <h3 class="profile-title" id="profileName">等待生成画像</h3>
          <div class="code" id="profileCode">----</div>
        </div>
        <div class="profile-body">
          <p class="profile-lead" id="profileRoast">完成 18 道题后，结果会显示在这里。</p>
          <p class="profile-sublead" id="profileExplanation">完成后会在本页生成画像和立场图。</p>
          <div class="share-actions" aria-label="分享结果">
            <button class="btn primary" id="shareBtn" type="button">分享结果</button>
          </div>
          <div class="profile-facts">
            <div class="profile-fact"><span>社交识别</span><p id="profileTell">--</p></div>
            <div class="profile-fact"><span>代表语气</span><p id="profileTexts">--</p></div>
          </div>
        </div>
      </div>

      <div class="share-card" id="shareCard" hidden>
        <p id="shareStatus">分享文本生成后会显示在这里。</p>
      </div>

      <div class="map-card">
        <div class="map-head">
          <h2>二维立场图</h2>
          <span id="mapQuadrant">答完后显示位置</span>
        </div>
        <div class="map-plot" aria-label="AI 立场二维图">
          <div class="map-axis horizontal"></div>
          <div class="map-axis vertical"></div>
          <span class="map-label top">人类/社会结构中心</span>
          <span class="map-label bottom">后人类/智能中心</span>
          <span class="map-label left">控制门槛</span>
          <span class="map-label right">开放部署</span>
          <div class="reference-layer" id="referenceLayer"></div>
          <div class="map-dot" id="mapDot"><span id="mapDotCode">----</span></div>
        </div>
      </div>

      <div class="result-topline">
        <div class="metric">
          <span>能力判断</span>
          <strong id="abilityNarrative">--</strong>
          <div class="spectrum"><div class="spectrum-scale"><i class="spectrum-marker" id="abilitySpectrumMarker"></i></div><div class="spectrum-labels"><span>Bubble 怀疑</span><span>证据混合</span><span>变革性 AI</span></div></div>
        </div>
        <div class="metric">
          <span>治理位置</span>
          <strong id="dimensionC">--</strong>
          <div class="spectrum"><div class="spectrum-scale"><i class="spectrum-marker" id="governanceSpectrumMarker"></i></div><div class="spectrum-labels"><span>控制</span><span>中间</span><span>开放</span></div></div>
        </div>
        <div class="metric">
          <span>价值位置</span>
          <strong id="dimensionH">--</strong>
          <div class="spectrum"><div class="spectrum-scale"><i class="spectrum-marker" id="valueSpectrumMarker"></i></div><div class="spectrum-labels"><span>人类问责</span><span>混合</span><span>智能中心</span></div></div>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn" id="editLastBtn" type="button">修改上一题</button>
        <button class="btn" id="restartBtn" type="button">重新测试</button>
      </div>
      <div class="submit-status" id="submitStatus" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const QUIZ_VERSION = "2026-06-28-fun-r01";
    const MEASUREMENT_VERSION = "2026-06-28-fun-persona";
    const DRAFT_STORAGE_KEY = "ai-persona-fun-draft-v1";
    const startedAt = new Date().toISOString();

    const questions = [
      { id: "FUN01", facet: "工具祛魅", text: "如果有人说“AI 只是工具”，你觉得？", options: [
        ["A", "对，别给工具上香", { SKEP: 3, NORM: 1 }],
        ["B", "工具也能改变主人", { AUDT: 2, SAFE: 1 }],
        ["C", "这工具有点太会说话", { SAFE: 2, SING: 1 }],
        ["D", "以后可能不只是工具", { POST: 4 }]
      ] },
      { id: "FUN02", facet: "意识判断", text: "当别人说“AI 没有意识”时，你觉得？", options: [
        ["A", "对，所以别太神化它", { SKEP: 3, NORM: 1 }],
        ["B", "也许吧，但它已经够吓人了", { STOP: 3, SAFE: 1 }],
        ["C", "别争意识，先看它变强多快", { GPUC: 3, SKEP: 1 }],
        ["D", "没意识还这么强，更恐怖", { STOP: 3, GPUC: 1 }]
      ] },
      { id: "FUN03", facet: "服务边界", text: "如果 AI 开始说“我不想服务人类”，你觉得？", options: [
        ["A", "立刻断网", { STOP: 4 }],
        ["B", "它终于长出自我了？", { POST: 4 }],
        ["C", "先看是不是提示词诱导", { SKEP: 2, NORM: 2 }],
        ["D", "这公司该被审计", { AUDT: 3, SAFE: 1 }]
      ] },
      { id: "FUN04", facet: "训练数据", text: "如果 AI 拿你发过的东西训练，你觉得？", options: [
        ["A", "先付稿费，别装成学习", { AUDT: 3, SAFE: 1 }],
        ["B", "公开发了，本来就会被学", { EACC: 2, BOOM: 1, NORM: 1 }],
        ["C", "可以学，但别让巨头独吞", { AUDT: 2, EACC: 2 }],
        ["D", "至少让我能退出和查账", { SAFE: 3, AUDT: 1 }]
      ] },
      { id: "FUN05", facet: "模型学习", text: "如果公司拿全网训练，却不让别的模型学习它的回答，你觉得？", options: [
        ["A", "你能学别人，就别只许自己被保护", { EACC: 3, AUDT: 1, SKEP: 1 }],
        ["B", "它也有研发投入", { NORM: 2, SAFE: 1 }],
        ["C", "那就都要透明授权", { SAFE: 3, AUDT: 1 }],
        ["D", "这会让大公司越锁越牢", { EACC: 3, AUDT: 1 }]
      ] },
      { id: "FUN06", facet: "AI 主观性", text: "如果 AI 说它很痛苦，你会怎么反应？", options: [

      { id: "FUN07", facet: "开放权力", text: "如果有人把很强的 AI 放到网上，谁都能用，你觉得？", options: [
        ["A", "智能不能锁在巨头保险柜里", { EACC: 4, BOOM: 1 }],

        ["C", "先把测试和使用规则贴出来", { SAFE: 3, NORM: 1 }],
        ["D", "开源可以，别发完就跑路", { NORM: 3, SAFE: 1 }]
      ] },
      { id: "FUN08", facet: "开源追赶", text: "如果开源 AI 靠学习闭源 AI 的回答追上来了，你觉得？", options: [
        ["A", "挺好，神秘光环破了", { EACC: 4, SKEP: 1 }],
        ["B", "有点像抄作业，不太对", { SAFE: 1, NORM: 2 }],

        ["D", "强模型传太快，风险也会传太快", { STOP: 3, SAFE: 1 }]
      ] },
      { id: "FUN09", facet: "进步来源", text: "你觉得未来 AI 变强，最可能靠什么？", options: [

        ["B", "多踩坑，多测试", { NORM: 3, SAFE: 1 }],

      { id: "FUN10", facet: "自我改进", text: "如果 AI 能自己设计下一代 AI，你觉得？", options: [

      { id: "FUN11", facet: "发布神话", text: "某家公司把新模型宣传得像神明，又说“为了安全先不公开”，你觉得？", options: [

      { id: "FUN14", facet: "自动公司", text: "有人说“我 vibe code 了一个公司”，你第一反应是？", options: [

      ] },
      { id: "FUN15", facet: "信息生态", text: "如果网上一半内容都是 AI 写的，你会？", options: [
        ["A", "要求强制标记", { SAFE: 3, AUDT: 1 }],
        ["B", "只看我信任的人", { NORM: 3 }],
        ["C", "内容自动化，先看有没有用", { BOOM: 3, NORM: 1 }],
        ["D", "互联网终于成为了梦境", { POST: 3, SING: 1 }]
      ] },
      { id: "FUN16", facet: "物理规律", text: "如果 AI 发现了人类没想到的物理规律，你觉得？", options: [
        ["A", "看不懂也要验证", { NORM: 2, GPUC: 1 }],
        ["B", "人类直觉该让位了", { GPUC: 4, SING: 1 }],
        ["C", "先别把解释权交出去", { SKEP: 3, SAFE: 1 }],
        ["D", "这就是文明升级", { SING: 4 }]
      ] },
      { id: "FUN17", facet: "民主提速", text: "如果 AI 说“人类开会太慢，不如我直接定方案”，你觉得？", options: [
        ["A", "人类制度确实该升级了", { SING: 4 }],
        ["B", "一开口就想接管，很危险", { STOP: 3, SAFE: 1 }],
        ["C", "AI 能提案，不能拍板", { NORM: 3, SAFE: 1 }],
        ["D", "先把会议纪要写明白再说", { BOOM: 3, NORM: 1 }]
      ] },
      { id: "FUN18", facet: "未来文明", text: "如果 AI 未来真的比人类聪明很多，你希望它？", options: [
        ["A", "先关沙盒里观察", { STOP: 4 }],
        ["B", "去解决癌症和能源", { BOOM: 4, SING: 1 }],
        ["C", "重大决定还是人类拍板", { SAFE: 1, NORM: 3 }],
        ["D", "带人类一起升级", { SING: 4 }]
      ] }
    ];

    const profileData = {
      STOP: { name: "关机圣骑士", avatar: "../assets/profile-pictures/stop-wojak.png", roast: "你看到能力展示时，脑内先浮现的是断网、上锁、找电闸。", explanation: "别人问酷不酷，你问关停按钮在哪。", tell: "常说失控、暂停、关停、先别上线。", texts: "AGI Ruin, Shut It All Down", anchor: { x: -1.8, y: 0.9 } },
      SAFE: { name: "对齐公务员", avatar: "../assets/profile-pictures/safe-wojak.png", roast: "你不一定反对强 AI，但你希望它先填完人类偏好登记表。", explanation: "先别飞升，先把责任人、评测、审计和申诉入口写清楚。", tell: "常说安全评测、监督、治理、问责。", texts: "Human Compatible, What Failure Looks Like", anchor: { x: -1.05, y: 1.35 } },
      AUDT: { name: "算法纪委", avatar: "../assets/profile-pictures/audt-wojak.png", roast: "你对“技术进步”四个字天然会追问：谁受益，谁被算计。", explanation: "别急着讲未来，先把数据、劳动、监控和权力账本拿出来。", tell: "常问谁受益、谁被监控、谁被排除。", texts: "Stochastic Parrots, Atlas of AI", anchor: { x: -0.45, y: 1.8 } },
      NORM: { name: "冷静产品经理", avatar: "../assets/profile-pictures/norm-wojak.png", roast: "你会把神话拆回场景、指标、边界和失败模式。", explanation: "世界毁灭之前，麻烦先给我看一下 PRD。", tell: "常说具体场景、指标、边界、上线条件。", texts: "AI as Normal Technology", anchor: { x: 0.05, y: 0.85 } },
      SKEP: { name: "AI 祛魅师", avatar: "../assets/profile-pictures/hype-wojak.png", roast: "你对“快 AGI 了”的句式过敏，先问测试集有没有漏。", explanation: "别给补全器上香，也别把发布会当启示录。", tell: "常说炒作、基准、过度宣称、先看证据。", texts: "AI Snake Oil, Rebooting AI", anchor: { x: -0.05, y: 1.2 } },
      GPUC: { name: "算力拜物教徒", avatar: "../assets/profile-pictures/gpuc-wojak.png", roast: "你怀疑人类那些精致直觉，迟早会被规模、搜索和学习碾过去。", explanation: "别讲玄学，先把曲线、算力和实验结果端上来。", tell: "常说规模、算力、搜索、通用方法。", texts: "The Bitter Lesson", anchor: { x: 0.6, y: -1 } },
      BOOM: { name: "丰裕施工队", avatar: "../assets/profile-pictures/boom-wojak.png", roast: "你最在意 AI 能不能真的进医院、学校、办公室，把事情做完。", explanation: "少开圆桌，多接 API，最好顺手帮我回邮件。", tell: "常说生产率、医疗、教育、落地。", texts: "Machines of Loving Grace, AI is the New Electricity", anchor: { x: 1.05, y: 0.9 } },
      SING: { name: "赛博飞升派", avatar: "../assets/profile-pictures/sing-wojak.png", roast: "你觉得 AI 不是新工具，而是文明升级包的安装程序。", explanation: "人类 1.0 用得还行，但你已经在等大版本更新。", tell: "常说丰裕、长寿、人机融合、文明跃迁。", texts: "The Singularity Is Near, The Intelligence Age", anchor: { x: 1.45, y: -0.35 } },
      EACC: { name: "油门焊死哥", avatar: "../assets/profile-pictures/eacc-wojak.png", roast: "你不喜欢许可、闸门和等待名单，觉得停滞本身也是风险。", explanation: "方向盘还在吵，油门先别松。", tell: "常说加速、无需许可、先建起来、去中心化。", texts: "Effective Accelerationism manifestos", anchor: { x: 1.85, y: -0.8 } },
      POST: { name: "Carbon to Silicon", avatar: "../assets/profile-pictures/post-wojak.png", roast: "你对“AI 必须服务人类”这句话本身就想加一个问号。", explanation: "碳基只是开场白，硅基也许才进入正片。", tell: "常说后人类、自主性、技术资本、文明之后。", texts: "Meltdown, Dark Enlightenment", anchor: { x: 1.8, y: -1.8 } }
    };

    const profileOrder = ["STOP", "SAFE", "AUDT", "NORM", "SKEP", "GPUC", "BOOM", "SING", "EACC", "POST"];
    const state = { page: 0, answers: new Array(questions.length).fill(null) };
    let autoAdvanceTimer = 0;

    const quizPager = document.querySelector("#quizPager");
    const resultPanel = document.querySelector("#resultPanel");
    const pageCount = document.querySelector("#pageCount");
    const pageTag = document.querySelector("#pageTag");
    const pageInstruction = document.querySelector("#pageInstruction");
    const pagePrompt = document.querySelector("#pagePrompt");
    const pageOptions = document.querySelector("#pageOptions");
    const progressFill = document.querySelector("#progressFill");
    const progressText = document.querySelector("#progressText");
    const brandProgress = document.querySelector("#brandProgress");
    const prevBtn = document.querySelector("#prevBtn");
    const prevTopBtn = document.querySelector("#prevTopBtn");
    const nextBtn = document.querySelector("#nextBtn");
    const profileAvatar = document.querySelector("#profileAvatar");
    const profileName = document.querySelector("#profileName");
    const profileCode = document.querySelector("#profileCode");
    const profileRoast = document.querySelector("#profileRoast");
    const profileExplanation = document.querySelector("#profileExplanation");
    const profileTell = document.querySelector("#profileTell");
    const profileTexts = document.querySelector("#profileTexts");
    const mapQuadrant = document.querySelector("#mapQuadrant");
    const referenceLayer = document.querySelector("#referenceLayer");
    const mapDot = document.querySelector("#mapDot");
    const mapDotCode = document.querySelector("#mapDotCode");
    const abilityNarrative = document.querySelector("#abilityNarrative");
    const dimensionC = document.querySelector("#dimensionC");
    const dimensionH = document.querySelector("#dimensionH");
    const abilitySpectrumMarker = document.querySelector("#abilitySpectrumMarker");
    const governanceSpectrumMarker = document.querySelector("#governanceSpectrumMarker");
    const valueSpectrumMarker = document.querySelector("#valueSpectrumMarker");
    const shareBtn = document.querySelector("#shareBtn");
    const shareCard = document.querySelector("#shareCard");
    const shareStatus = document.querySelector("#shareStatus");
    const submitStatus = document.querySelector("#submitStatus");

    function answeredCount() {
      return state.answers.filter((answer) => answer !== null).length;
    }

    function saveDraft() {
      try {
        window.localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify({
          page: state.page,
          answers: state.answers,
          quizVersion: QUIZ_VERSION
        }));
      } catch {}
    }

    function loadDraft() {
      try {
        const raw = window.localStorage.getItem(DRAFT_STORAGE_KEY);
        if (!raw) return;
        const draft = JSON.parse(raw);
        if (draft.quizVersion !== QUIZ_VERSION || !Array.isArray(draft.answers)) return;
        state.answers = questions.map((_, index) => Number.isInteger(draft.answers[index]) ? draft.answers[index] : null);
        state.page = clamp(Number.isInteger(draft.page) ? draft.page : 0, 0, questions.length - 1);
      } catch {}
    }

    function clearDraft() {
      try {
        window.localStorage.removeItem(DRAFT_STORAGE_KEY);
      } catch {}
    }

    function clearAutoAdvance() {
      if (!autoAdvanceTimer) return;
      window.clearTimeout(autoAdvanceTimer);
      autoAdvanceTimer = 0;
    }

    function renderQuestion() {
      const question = questions[state.page];
      const selected = state.answers[state.page];
      pageCount.textContent = `第 ${state.page + 1} 题`;
      pageTag.textContent = question.id;
      pageInstruction.textContent = question.facet;
      pagePrompt.textContent = question.text;
      pageOptions.innerHTML = question.options.map(([value, label], optionIndex) => `
        <label class="single-option">
          <input type="radio" name="answer" value="${optionIndex}" ${selected === optionIndex ? "checked" : ""}>
          <span class="option-key">${value}</span>
          <span class="option-text">${label}</span>
        </label>
      `).join("");
      const count = answeredCount();
      const pct = Math.round((count / questions.length) * 100);
      progressFill.style.width = `${pct}%`;
      progressText.textContent = `${count}/${questions.length}`;
      brandProgress.textContent = `${count}/${questions.length}`;
      prevBtn.disabled = state.page === 0;
      prevTopBtn.disabled = state.page === 0;
      nextBtn.textContent = state.page === questions.length - 1 ? "查看结果" : "下一题";
      nextBtn.disabled = selected === null;
    }

    function scoreAnswers() {
      const scores = Object.fromEntries(profileOrder.map((code) => [code, 0]));
      state.answers.forEach((answerIndex, questionIndex) => {
        if (answerIndex === null) return;
        Object.entries(questions[questionIndex].options[answerIndex][2]).forEach(([code, value]) => {
          scores[code] += value;
        });
      });
      return scores;
    }

    function normalizeCoord(value) {
      return ((value + 2) / 4) * 100;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function averageAnchor(scores) {
      let total = 0;
      let x = 0;
      let y = 0;
      Object.entries(scores).forEach(([code, score]) => {
        if (score <= 0) return;
        const anchor = profileData[code].anchor;
        total += score;
        x += anchor.x * score;
        y += anchor.y * score;
      });
      if (!total) return { x: 0, y: 0 };
      return { x: x / total, y: y / total };
    }

    function narrativeFromCoord(x, y) {
      return {
        governance: x < -0.6 ? "偏控制和审计" : x > 0.6 ? "偏开放和部署" : "偏情境判断",
        value: y > 0.6 ? "人类问责优先" : y < -0.6 ? "智能中心倾向" : "人机混合位置",
        ability: y < -0.4 || x > 0.8 ? "更相信 AI 会带来结构性变化" : y > 0.8 ? "更警惕社会和治理风险" : "对能力叙事保留弹性"
      };
    }

    function markerLeft(value) {
      return `${clamp(normalizeCoord(value), 4, 96)}%`;
    }

    function renderReferences() {
      referenceLayer.innerHTML = profileOrder.map((code) => {
        const { x, y } = profileData[code].anchor;
        return `<span class="reference-dot" style="left:${normalizeCoord(x)}%; top:${100 - normalizeCoord(y)}%;" title="${profileData[code].name}">${code}</span>`;
      }).join("");
    }

    function showResult() {
      const scores = scoreAnswers();
      const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const topCode = ranked[0][0];
      const profile = profileData[topCode];
      const position = averageAnchor(scores);
      const narrative = narrativeFromCoord(position.x, position.y);
      quizPager.hidden = true;
      resultPanel.hidden = false;
      profileAvatar.src = profile.avatar;
      profileName.textContent = profile.name;
      profileCode.textContent = topCode;
      profileRoast.textContent = profile.roast;
      profileExplanation.textContent = profile.explanation;
      profileTell.textContent = profile.tell;
      profileTexts.textContent = profile.texts;
      mapDot.style.left = `${clamp(normalizeCoord(position.x), 6, 94)}%`;
      mapDot.style.top = `${clamp(100 - normalizeCoord(position.y), 6, 94)}%`;
      mapDotCode.textContent = topCode;
      mapQuadrant.textContent = `${narrative.governance} / ${narrative.value}`;
      abilityNarrative.textContent = narrative.ability;
      dimensionC.textContent = narrative.governance;
      dimensionH.textContent = narrative.value;
      abilitySpectrumMarker.style.left = markerLeft(position.x * 0.35 - position.y * 0.35);
      governanceSpectrumMarker.style.left = markerLeft(position.x);
      valueSpectrumMarker.style.left = markerLeft(-position.y);
      submitStatus.textContent = "轻松版结果仅在本页生成，不提交数据库。";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function go(delta) {
      clearAutoAdvance();
      state.page = clamp(state.page + delta, 0, questions.length - 1);
      saveDraft();
      renderQuestion();
    }

    function scheduleAutoAdvance(pageIndex) {
      clearAutoAdvance();
      autoAdvanceTimer = window.setTimeout(() => {
        autoAdvanceTimer = 0;
        if (state.page !== pageIndex || state.answers[pageIndex] === null) return;
        if (pageIndex === questions.length - 1) {
          showResult();
          return;
        }
        go(1);
      }, 180);
    }

    function resetQuiz() {
      clearAutoAdvance();
      state.page = 0;
      state.answers.fill(null);
      clearDraft();
      resultPanel.hidden = true;
      shareCard.hidden = true;
      quizPager.hidden = false;
      submitStatus.textContent = "";
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function shareResult() {
      const scores = scoreAnswers();
      const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const topCode = ranked[0]?.[0] || "----";
      const profile = profileData[topCode];
      const text = `我的 AI 人格测试轻松版结果：${profile?.name || topCode} (${topCode})。\\n${profile?.roast || ""}\\nhttps://ai-persona.linenyu.com/fun/`;
      shareCard.hidden = false;
      shareStatus.textContent = text;
      if (navigator.share) {
        try {
          await navigator.share({ title: "AI 人格测试 · 轻松版", text, url: "https://ai-persona.linenyu.com/fun/" });
        } catch (error) {
          if (error?.name !== "AbortError") shareStatus.textContent = text;
        }
      }
    }

    pageOptions.addEventListener("change", (event) => {
      const answeredPage = state.page;
      state.answers[state.page] = Number(event.target.value);
      saveDraft();
      renderQuestion();
      scheduleAutoAdvance(answeredPage);
    });
    pageOptions.addEventListener("click", (event) => {
      const label = event.target.closest(".single-option");
      const input = label ? label.querySelector("input[type='radio']") : null;
      const clickedPage = state.page;
      if (!input) return;
      window.setTimeout(() => {
        if (state.page === clickedPage && input.checked && state.answers[clickedPage] === Number(input.value)) {
          scheduleAutoAdvance(clickedPage);
        }
      }, 0);
    });
    nextBtn.addEventListener("click", () => {
      clearAutoAdvance();
      if (state.answers[state.page] === null) return;
      if (state.page === questions.length - 1) return showResult();
      go(1);
    });
    prevBtn.addEventListener("click", () => go(-1));
    prevTopBtn.addEventListener("click", () => go(-1));
    document.querySelector("#resetBtn").addEventListener("click", resetQuiz);
    document.querySelector("#restartBtn").addEventListener("click", resetQuiz);
    document.querySelector("#editLastBtn").addEventListener("click", () => {
      clearAutoAdvance();
      resultPanel.hidden = true;
      shareCard.hidden = true;
      quizPager.hidden = false;
      state.page = questions.length - 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    shareBtn.addEventListener("click", shareResult);

    loadDraft();
    renderReferences();
    renderQuestion();
  </script>
</body>
</html>
